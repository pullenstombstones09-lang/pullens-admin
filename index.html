<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pullen's Tombstones — Admin Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1E3A8A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Inter Tight',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:1rem}
img{max-width:100%;display:block}

/* ── CSS VARS ── */
:root{
  --cream:#FBF8F3;--paper:#F5F1E8;--ivory:#FFFEFB;--ink:#1C1917;--blue:#1E3A8A;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;--gray:#6b7280;--graylt:#e5e7eb;
  --bg:var(--cream);--surface:var(--ivory);--surface2:var(--paper);--border:#e0dcd4;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow2:0 2px 8px rgba(0,0,0,.12),0 8px 24px rgba(0,0,0,.06);
  --radius:12px;--radius-sm:8px;
}
[data-theme="dark"]{
  --cream:#0f0f0f;--paper:#1a1a1a;--ivory:#141414;--ink:#e5e5e5;--blue:#3b82f6;
  --bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#2a2a2a;
  --graylt:#333;--shadow:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shadow2:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
}

/* ── ANIMATIONS ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes springIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.anim-fade{animation:fadeInUp .3s ease both}
.anim-stagger>*{animation:fadeInUp .3s ease both}
.anim-stagger>*:nth-child(1){animation-delay:.05s}
.anim-stagger>*:nth-child(2){animation-delay:.1s}
.anim-stagger>*:nth-child(3){animation-delay:.15s}
.anim-stagger>*:nth-child(4){animation-delay:.2s}
.anim-stagger>*:nth-child(5){animation-delay:.25s}

/* ── LAYOUT ── */
#app{display:flex;min-height:100dvh}
#sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100dvh;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
#sidebar .logo-area{padding:20px;text-align:center;border-bottom:1px solid var(--border)}
#sidebar .logo-area img{height:48px;margin:0 auto 8px}
#sidebar .logo-area h2{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--ink)}
#sidebar .logo-area span{font-size:.7rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
#sidebar nav{flex:1;overflow-y:auto;padding:8px}
#sidebar nav button{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;color:var(--ink);text-align:left;transition:background .15s}
#sidebar nav button:hover{background:var(--surface2)}
#sidebar nav button.active{background:var(--blue);color:#fff}
#sidebar nav button .nav-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#sidebar nav button .nav-icon svg{width:20px;height:20px}
#sidebar nav button .badge{margin-left:auto;background:var(--red);color:#fff;font-size:.65rem;padding:2px 6px;border-radius:10px;font-weight:600}
#sidebar .sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:.75rem;color:var(--gray);display:flex;align-items:center;justify-content:space-between}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--blue);animation:pulse 1.5s infinite}
.sync-dot.offline{background:var(--amber)}

#main{flex:1;margin-left:250px;padding:20px 24px 100px;min-height:100dvh}

/* ── BOTTOM BAR (mobile) ── */
#bottombar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:4px 0 env(safe-area-inset-bottom,4px)}
#bottombar .bb-inner{display:flex;justify-content:space-around;align-items:center}
#bottombar button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;min-width:48px;min-height:48px;font-size:.6rem;color:var(--gray);font-weight:500}
#bottombar button.active{color:var(--blue)}
#bottombar button svg{width:22px;height:22px}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:16px 12px 90px}
  #bottombar{display:block}
  .desktop-only{display:none!important}
  .mobile-header{display:flex!important}
}
@media(min-width:769px){
  .mobile-only{display:none!important}
  .mobile-header{display:none!important}
}

/* ── MOBILE HEADER ── */
.mobile-header{display:none;align-items:center;justify-content:space-between;padding:8px 0 16px;margin-bottom:4px}
.mobile-header .mh-left{display:flex;align-items:center;gap:10px}
.mobile-header .mh-left img{height:32px}
.mobile-header .mh-left h2{font-family:'Fraunces',serif;font-size:.95rem}
.hamburger{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--surface)}
.hamburger svg{width:24px;height:24px}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
@media(max-width:480px){.card-grid{grid-template-columns:1fr}}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.kpi .kpi-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:4px}
.kpi .kpi-value{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--ink)}
.kpi .kpi-sub{font-size:.7rem;color:var(--gray);margin-top:2px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;transition:all .15s;min-height:48px;min-width:48px;justify-content:center}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--surface2);color:var(--ink);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-sm{padding:6px 12px;min-height:36px;font-size:.8rem}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── TABLES ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface)}
.tbl{width:100%;border-collapse:collapse;font-size:.8rem}
.tbl th{background:var(--surface2);font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;position:sticky;top:0;z-index:1;border-bottom:2px solid var(--border)}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl tr:hover td{background:var(--surface2)}
.tbl .num{font-family:'JetBrains Mono',monospace;text-align:right}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:520px;max-height:90dvh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1);padding:20px}
@media(min-width:769px){
  .modal-bg.open{align-items:center}
  .modal{border-radius:var(--radius);animation:springIn .3s ease}
}
.modal h3{font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:16px}
.modal .form-row{margin-bottom:12px}
.modal .form-row label{display:block;font-size:.75rem;font-weight:600;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.modal .form-row input,.modal .form-row select,.modal .form-row textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--ink);font-size:.9rem}
.modal .form-row textarea{min-height:80px;resize:vertical}
.modal .form-actions{display:flex;gap:8px;margin-top:16px}
.modal .form-actions .btn{flex:1}

/* ── DRAWER ── */
#drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
#drawer-bg.open{display:block}
#drawer{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100dvh;background:var(--surface);box-shadow:var(--shadow2);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);padding:20px}
#drawer.open{transform:translateX(0)}
#drawer .drawer-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.drawer-avatar{width:80px;height:80px;border-radius:50%;background:var(--surface2);margin:0 auto 12px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.8rem;color:var(--gray)}
.drawer-avatar img{width:100%;height:100%;object-fit:cover}
.drawer-name{text-align:center;font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700}
.drawer-occ{text-align:center;font-size:.8rem;color:var(--gray);margin-bottom:16px}
.drawer-section{margin-bottom:16px}
.drawer-section h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.drawer-row{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0}
.drawer-row .dr-label{color:var(--gray)}
.drawer-row .dr-val{font-weight:500;text-align:right;max-width:60%;word-break:break-word}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#loginScreen.hidden{display:none}
.login-logo{margin-bottom:20px;text-align:center}
.login-logo img{height:64px;margin:0 auto 8px}
.login-logo h1{font-family:'Fraunces',serif;font-size:1.4rem}
.login-logo p{font-size:.75rem;color:var(--gray);text-transform:uppercase;letter-spacing:1px}
.user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;max-width:360px;width:100%}
.user-grid button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border-radius:var(--radius);background:var(--surface);border:2px solid var(--border);font-size:.75rem;font-weight:600;color:var(--ink);transition:all .15s;min-height:48px}
.user-grid button:hover,.user-grid button.selected{border-color:var(--blue);background:var(--blue);color:#fff}
.user-grid button .ug-icon{width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1rem;color:var(--gray);margin-bottom:2px}
.user-grid button:hover .ug-icon,.user-grid button.selected .ug-icon{background:rgba(255,255,255,.2);color:#fff}
.pin-display{display:flex;gap:10px;margin-bottom:16px;justify-content:center}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--blue);border-color:var(--blue)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;width:100%}
.keypad button{height:56px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:600;color:var(--ink);transition:all .1s}
.keypad button:active{transform:scale(.95);background:var(--surface2)}
.keypad .key-clear{font-size:.8rem;font-family:'Inter Tight',sans-serif}
.login-error{color:var(--red);font-size:.8rem;margin-top:8px;min-height:20px;text-align:center}

/* ── TOAST ── */
#toasts{position:fixed;top:16px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:360px}
.toast{padding:12px 16px;border-radius:var(--radius-sm);color:#fff;font-size:.85rem;font-weight:500;animation:fadeInUp .3s ease;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.info{background:var(--blue)}
.toast.warning{background:var(--amber)}

/* ── ERROR BAR ── */
#errorBar{display:none;position:fixed;top:0;left:0;right:0;background:var(--red);color:#fff;padding:12px 20px;z-index:250;text-align:center;font-size:.85rem;animation:fadeIn .3s}
#errorBar button{color:#fff;text-decoration:underline;margin-left:8px;font-weight:600;font-size:.85rem}

/* ── ATTENDANCE GRID ── */
.att-grid{width:100%;border-collapse:collapse;font-size:.75rem}
.att-grid th{padding:8px 6px;background:var(--surface2);border:1px solid var(--border);font-weight:600;text-align:center;position:sticky;top:0;z-index:1}
.att-grid td{padding:4px;border:1px solid var(--border);text-align:center;vertical-align:middle}
.att-grid .emp-name{text-align:left;padding:6px 8px;white-space:nowrap;font-weight:500;position:sticky;left:0;background:var(--surface);z-index:1}
.att-cell{min-width:60px;min-height:48px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;padding:4px;font-size:.65rem;font-weight:600;transition:all .1s}
.att-cell:hover{opacity:.8}
.att-cell.present{background:#dcfce7;color:#166534}
.att-cell.late{background:#fef3c7;color:#92400e}
.att-cell.absent{background:#fee2e2;color:#991b1b}
.att-cell.leave{background:#dbeafe;color:#1e40af}
.att-cell.ph{background:#e9d5ff;color:#6b21a8}
.att-cell.off{background:var(--surface2);color:var(--gray)}
.att-cell.empty{background:var(--bg);border:1px dashed var(--border)}
[data-theme="dark"] .att-cell.present{background:#052e16;color:#86efac}
[data-theme="dark"] .att-cell.late{background:#451a03;color:#fde68a}
[data-theme="dark"] .att-cell.absent{background:#450a0a;color:#fca5a5}
[data-theme="dark"] .att-cell.leave{background:#172554;color:#93c5fd}
[data-theme="dark"] .att-cell.ph{background:#3b0764;color:#d8b4fe}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.week-nav h2{font-family:'Fraunces',serif;font-size:1.1rem;flex:1}
.week-nav .wn-dates{font-size:.8rem;color:var(--gray);font-family:'JetBrains Mono',monospace}

/* ── EMPLOYEE GRID ── */
.emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.emp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.emp-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.emp-card .ec-avatar{width:56px;height:56px;border-radius:50%;background:var(--surface2);margin:0 auto 8px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.2rem;color:var(--gray)}
.emp-card .ec-avatar img{width:100%;height:100%;object-fit:cover}
.emp-card .ec-name{font-weight:600;font-size:.8rem;margin-bottom:2px}
.emp-card .ec-occ{font-size:.65rem;color:var(--gray)}
.emp-card .ec-status{font-size:.6rem;margin-top:4px;padding:2px 6px;border-radius:4px;display:inline-block}
.ec-status.active{background:#dcfce7;color:#166534}
.ec-status.inactive{background:#fee2e2;color:#991b1b}
[data-theme="dark"] .ec-status.active{background:#052e16;color:#86efac}
[data-theme="dark"] .ec-status.inactive{background:#450a0a;color:#fca5a5}

/* ── SIGN-OFF ── */
.signoff-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;animation:fadeInUp .3s ease}
.signoff-card h3{font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:12px}
.signoff-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:.8rem;margin-bottom:12px}
.signoff-breakdown .sb-label{color:var(--gray)}
.signoff-breakdown .sb-val{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:500}
.signoff-breakdown .sb-total{font-weight:700;font-size:.9rem;color:var(--green);border-top:2px solid var(--border);padding-top:4px;margin-top:4px}
.sig-canvas-wrap{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;position:relative;background:#fff}
.sig-canvas-wrap canvas{width:100%;height:120px;display:block;touch-action:none}
.sig-canvas-wrap .sig-clear{position:absolute;top:4px;right:4px;font-size:.7rem;color:var(--gray);padding:4px 8px;background:var(--surface2);border-radius:4px}

/* ── PETTY CASH ── */
.pc-balance{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;text-align:center;margin:12px 0}
.pc-balance.positive{color:var(--green)}
.pc-balance.negative{color:var(--red)}

/* ── SETTINGS ── */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.settings-card h4{font-family:'Fraunces',serif;font-size:.95rem;margin-bottom:12px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.setting-row:last-child{border-bottom:none}

/* ── TOGGLE ── */
.toggle{width:44px;height:24px;border-radius:12px;background:var(--graylt);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--blue)}
.toggle::after{content:'';width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}

/* ── SPINNER ── */
.spinner{width:20px;height:20px;border:2px solid var(--graylt);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ── VIEW HEADER ── */
.view-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.view-header h2{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700}

/* ── SEARCH ── */
.search-box{position:relative;max-width:300px}
.search-box input{width:100%;padding:8px 12px 8px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:.85rem;color:var(--ink)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--gray)}

/* ── PRINT ── */
@media print{
  #sidebar,#bottombar,#toasts,#errorBar,.mobile-header,.no-print{display:none!important}
  #main{margin:0!important;padding:10px!important}
  body{background:#fff!important;color:#000!important}
  .card,.kpi{box-shadow:none!important;border:1px solid #ccc!important}
  .tbl td,.tbl th{padding:4px 6px!important;font-size:9pt!important}
}
</style>
</head>
<body>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- ERROR BAR -->
<div id="errorBar">
  <span id="errorMsg">Failed to load data</span>
  <button onclick="loadAll()">Retry</button>

// ══════════════════════════════════════════════════════════════
// UTILITIES

function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function formatCurrency(n) {
  if (n == null || isNaN(n)) return 'R0.00';
  return 'R' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function toast(msg, type) {
  type = type || 'info';
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  $('#toasts').appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

function showError(msg) {
  $('#errorMsg').textContent = msg;
  $('#errorBar').style.display = 'block';
}
function hideError() { $('#errorBar').style.display = 'none'; }

function setSyncState(s) {
  syncState = s;
  var dot = $('#syncStatus');
  if (!dot) return;
  if (s === 'synced') dot.innerHTML = '<span class="sync-dot synced"></span> Synced';
  else if (s === 'syncing') dot.innerHTML = '<span class="sync-dot syncing"></span> Syncing...';
  else dot.innerHTML = '<span class="sync-dot offline"></span> Offline';
}

// ── Date helpers ──
function today() {
  var d = new Date();
  return fmtDate(d);
}

function fmtDate(d) {
  if (typeof d === 'string') {
    if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
    var p = new Date(d);
    if (isNaN(p)) return d;
    return p.getFullYear() + '-' + String(p.getMonth() + 1).padStart(2, '0') + '-' + String(p.getDate()).padStart(2, '0');
  }
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function parseDate(s) {
  if (!s) return new Date();
  var parts = String(s).split('-');
  if (parts.length === 3) return new Date(+parts[0], +parts[1] - 1, +parts[2]);
  return new Date(s);
}

function dayName(d) { return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][parseDate(d).getDay()]; }

function addDays(dateStr, n) {
  var d = parseDate(dateStr);
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}

function fmtDateShort(s) {
  var d = parseDate(s);
  return d.getDate() + '/' + (d.getMonth() + 1);
}

function fmtDateFull(s) {
  var d = parseDate(s);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function getWeekStart(dateStr) {
  // Week starts on Friday
  var d = parseDate(dateStr || today());
  var dow = d.getDay(); // 0=Sun
  // Friday=5
  var diff = (dow >= 5) ? (dow - 5) : (dow + 2);
  d.setDate(d.getDate() - diff);
  return fmtDate(d);
}

function getWeekDates(fridayStr) {
  var dates = [];
  for (var i = 0; i < 7; i++) dates.push(addDays(fridayStr, i));
  return dates;
}

function getWeekEnd(fridayStr) { return addDays(fridayStr, 6); }

// ── Time normalisation ──
function normaliseTime(val) {
  if (!val || val === '' || val === 'undefined' || val === 'null') return '';
  var s = String(val).trim();
  // Already HH:mm
  if (/^\d{1,2}:\d{2}$/.test(s)) return s.length === 4 ? '0' + s : s;
  // Epoch datetime like 1899-12-30T06:00:00.000Z
  if (s.indexOf('T') !== -1) {
    var m = s.match(/T(\d{2}):(\d{2})/);
    if (m) {
      var h = parseInt(m[1], 10) + 2; // UTC+2 for SAST
      if (h >= 24) h -= 24;
      return String(h).padStart(2, '0') + ':' + m[2];
    }
  }
  return s;
}

function normaliseDate(val) {
  if (!val || val === '') return '';
  var s = String(val).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  try {
    var d = new Date(s);
    if (!isNaN(d)) return fmtDate(d);
  } catch (e) {}
  return s;
}

// ── Deduplication ──
function dedupeAttendance(records) {
  var map = {};
  records.forEach(function(r) {
    var key = (r.ptCode || r.employeeId || '') + '|' + normaliseDate(r.date);
    map[key] = r; // last wins
  });
  return Object.values(map);
}

// ── Late dock calc ──
function calcLateDock(timeIn) {
  if (!timeIn) return 0;
  var t = normaliseTime(timeIn);
  if (!t) return 0;
  var parts = t.split(':');
  var h = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  var mins = h * 60 + m;
  var start = 8 * 60; // 08:00
  if (mins <= start + 5) return 0;       // grace
  if (mins <= start + 30) return 30;      // dock 30min
  if (mins <= start + 60) return 60;      // dock 1hr
  return 60; // after 09:00, supervisor decides — default 60
}

// ── Hours worked calc ──
function calcHoursWorked(timeIn, timeOut, dayOfWeek) {
  if (!timeIn || !timeOut) return 0;
  var tIn = normaliseTime(timeIn);
  var tOut = normaliseTime(timeOut);
  if (!tIn || !tOut) return 0;
  var p1 = tIn.split(':'), p2 = tOut.split(':');
  var h1 = parseInt(p1[0], 10), m1 = parseInt(p1[1], 10);
  var h2 = parseInt(p2[0], 10), m2 = parseInt(p2[1], 10);
  var diff = ((h2 * 60 + m2) - (h1 * 60 + m1)) / 60;
  if (diff < 0) diff += 24;
  // Subtract 45min unpaid break
  diff = Math.max(0, diff - 0.75);
  return Math.round(diff * 100) / 100;
}

// ══════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════
function apiCall(action, data) {
  data = data || {};
  setSyncState('syncing');
  var body = { action: action, data: data, user: { id: currentUser ? currentUser.id : '', pin: currentUser ? currentUser.pin : '', token: '' } };
  return fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(body),
    redirect: 'follow'
  })
  .then(function(r) { return r.json(); })
  .then(function(j) {
    setSyncState('synced');
    if (j.error) throw new Error(j.error);
    return j;
  })
  .catch(function(e) {
    setSyncState('offline');
    throw e;
  });
}

function loadAll() {
  hideError();
  setSyncState('syncing');
  return Promise.all([
    apiCall('listEmployees'),
    apiCall('listRegister', { register: 'attendance' }),
    apiCall('listRegister', { register: 'overtime' }),
    apiCall('listRegister', { register: 'loans' }),
    apiCall('listRegister', { register: 'warnings' }),
    apiCall('listRegister', { register: 'leave' }),
    apiCall('listRegister', { register: 'medical' }),
    apiCall('listRegister', { register: 'pettycash' }),
    apiCall('getSettings'),
  ])
  .then(function(results) {
    var empRes = results[0], attRes = results[1], otRes = results[2], loanRes = results[3];
    var warnRes = results[4], leaveRes = results[5], medRes = results[6], pcRes = results[7], settRes = results[8];

    employees = empRes.data || empRes.employees || empRes || [];
    if (!Array.isArray(employees)) employees = [];

    function parseReg(res) {
      var d = res.data || res.entries || res || [];
      return Array.isArray(d) ? d : [];
    }

    registers.attendance = dedupeAttendance(parseReg(attRes).map(function(r) {
      return Object.assign({}, r, { date: normaliseDate(r.date), timeIn: normaliseTime(r.timeIn), timeOut: normaliseTime(r.timeOut) });
    }));
    registers.overtime = parseReg(otRes).map(function(r) { return Object.assign({}, r, { date: normaliseDate(r.date) }); });
    registers.loans = parseReg(loanRes);
    registers.warnings = parseReg(warnRes).map(function(r) { return Object.assign({}, r, { date: normaliseDate(r.date) }); });
    registers.leave = parseReg(leaveRes).map(function(r) {
      return Object.assign({}, r, { startDate: normaliseDate(r.startDate), endDate: normaliseDate(r.endDate), date: normaliseDate(r.date || r.startDate) });
    });
    registers.medical = parseReg(medRes).map(function(r) { return Object.assign({}, r, { date: normaliseDate(r.date) }); });
    registers.pettycash = parseReg(pcRes).map(function(r) { return Object.assign({}, r, { date: normaliseDate(r.date) }); });
    settings = settRes.data || settRes.settings || settRes || {};

    setSyncState('synced');
    buildNav();
    renderCurrentView();
    toast('Data loaded', 'success');
  })
  .catch(function(e) {
    console.error('loadAll error:', e);
    showError('Failed to load data: ' + e.message);
    setSyncState('offline');
  });
}

  for (var i = 1; i <= 9; i++) {
    (function(digit) {

      b.textContent = String(digit);
      b.onclick = function() { enterPin(String(digit)); };
      kp.appendChild(b);
    })(i);
  }
  var clearBtn = document.createElement('button');
  clearBtn.className = 'key-clear';
  clearBtn.textContent = 'Clear';
  clearBtn.onclick = clearPin;
  kp.appendChild(clearBtn);

  zeroBtn.onclick = function() { enterPin('0'); };
  kp.appendChild(zeroBtn);

  delBtn.className = 'key-clear';
  delBtn.textContent = 'Del';
  delBtn.onclick = deletePin;
  kp.appendChild(delBtn);

function selectLoginUser(u) {
  selectedLoginUser = u;
  $$('.user-grid button').forEach(function(b) { b.classList.remove('selected'); });
  $('#ug_' + u.id).classList.add('selected');
  pinEntry = '';
  updatePinDots();
  $('#loginError').textContent = '';
}

function enterPin(d) {
  if (!selectedLoginUser) { $('#loginError').textContent = 'Select a user first'; return; }
  if (pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if (pinEntry.length === 4) attemptLogin();
}

function clearPin() { pinEntry = ''; updatePinDots(); $('#loginError').textContent = ''; }
function deletePin() { pinEntry = pinEntry.slice(0, -1); updatePinDots(); }

function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    $('#pd' + i).classList.toggle('filled', i < pinEntry.length);
  }
}

function attemptLogin() {
  var u = selectedLoginUser;
  if (pinEntry !== u.pin) {
    $('#loginError').textContent = 'Incorrect PIN';
    pinEntry = '';
    updatePinDots();
    return;
  }
  apiCall('login', { userId: u.id, pin: u.pin })
  .then(function(res) {
    if (res.error) {
      $('#loginError').textContent = res.error;
      pinEntry = '';
      updatePinDots();
      return;
    }
    currentUser = u;
    $('#loginScreen').classList.add('hidden');
    currentWeekStart = getWeekStart(today());
    loadAll();
  })
  .catch(function(e) {
    // Allow offline login
    currentUser = u;
    $('#loginScreen').classList.add('hidden');
    currentWeekStart = getWeekStart(today());
    toast('Logged in offline', 'warning');
    buildNav();
    renderCurrentView();
  });
}

function logout() {
  currentUser = null;
  payrollResults = null;
  $('#loginScreen').classList.remove('hidden');
  pinEntry = '';
  updatePinDots();
  selectedLoginUser = null;
  $$('.user-grid button').forEach(function(b) { b.classList.remove('selected'); });
}

// ══════════════════════════════════════════════════════════════
// PAYROLL CALCULATION ENGINE
// ══════════════════════════════════════════════════════════════
function getWeeklyLoanDeduction(ptCode) {
  var loan = registers.loans.find(function(l) {
    var code = l.ptCode || l.employeeId || '';
    return code === ptCode && Number(l.balance || l.amount || 0) > 0;
  });
  if (!loan) return 0;
  return Number(loan.weeklyDeduction || loan.weekly || 0);
}

function calcPayrollForWeek(weekStart) {
  var weekDates = getWeekDates(weekStart);
  var activeEmps = employees.filter(function(e) { return (e.status || '').toLowerCase() !== 'inactive'; });
  var results = [];

  activeEmps.forEach(function(emp) {
    var ptCode = emp.ptCode || emp.id || '';
    var weeklyWage = Number(emp.weeklyWage) || 0;
    var hourlyRate = weeklyWage / ORDINARY_HOURS;
    var totalWeekdayHours = 0;
    var totalDockMinutes = 0;
    var dayDetails = [];

    weekDates.forEach(function(dateStr, i) {
      var dn = DAYS_ORDER[i];
      var isWeekend = (dn === 'Sat' || dn === 'Sun');
      var att = registers.attendance.find(function(a) {
        return (a.ptCode === ptCode || a.employeeId === ptCode) && a.date === dateStr;
      });

      if (!att || isWeekend) {
        dayDetails.push({ day: dn, date: dateStr, hours: 0, dock: 0, status: att ? (att.status || 'present') : (isWeekend ? 'off' : 'absent') });
        return;
      }

      var status = (att.status || 'present').toLowerCase();
      if (status === 'leave' || status === 'ph' || status === 'absent' || status === 'off') {
        dayDetails.push({ day: dn, date: dateStr, hours: 0, dock: 0, status: status });
        return;
      }

      var hrs = Number(att.hoursWorked) || calcHoursWorked(att.timeIn, att.timeOut, dn);
      var dock = calcLateDock(att.timeIn);
      totalWeekdayHours += hrs;
      totalDockMinutes += dock;
      dayDetails.push({ day: dn, date: dateStr, hours: hrs, dock: dock, status: status });
    });

    var ordinaryHours = Math.min(totalWeekdayHours, ORDINARY_HOURS);
    var overtimeHours = Math.max(0, totalWeekdayHours - ORDINARY_HOURS);
    var basePay = ordinaryHours * hourlyRate;
    var lateDock = (totalDockMinutes / 60) * hourlyRate;
    var otPay = overtimeHours * hourlyRate * OT_MULTI;
    var gross = basePay + otPay - lateDock;
    if (gross < 0) gross = 0;
    var uif = gross * UIF_RATE;
    var loanDeduction = getWeeklyLoanDeduction(ptCode);
    var garnishee = Number(emp.garnishee) || 0;
    var net = gross - uif - loanDeduction - garnishee;

    results.push({
      ptCode: ptCode,
      fullName: emp.fullName || '',
      idNumber: emp.idNumber || '',
      occupation: emp.occupation || '',
      weeklyWage: weeklyWage,
      hourlyRate: hourlyRate,
      totalWeekdayHours: totalWeekdayHours,
      ordinaryHours: ordinaryHours,
      overtimeHours: overtimeHours,
      basePay: basePay,
      lateDock: lateDock,
      otPay: otPay,
      gross: gross,
      uif: uif,
      loanDeduction: loanDeduction,
      garnishee: garnishee,
      net: Math.max(0, net),
      dayDetails: dayDetails,
      totalDockMinutes: totalDockMinutes,
    });
  });
  return results;
}

function getPayrollEstimate() {
  var results = calcPayrollForWeek(currentWeekStart);
  return results.reduce(function(sum, r) { return sum + r.gross; }, 0);
}

function getStatusClass(s) {
  if (!s) return 'empty';
  var st = s.toLowerCase();

  if (st === 'leave') return 'leave';
  if (st === 'ph' || st === 'public holiday') return 'ph';
  if (st === 'off') return 'off';
  return 'present';
}

function changeWeek(dir) {
  currentWeekStart = addDays(currentWeekStart, dir * 7);
  renderCurrentView();
}

function openAttendanceModal(emp, dateStr, existing) {
  var ptCode = emp.ptCode || emp.id || '';
  var dn = dayName(dateStr);
  var tIn = existing ? normaliseTime(existing.timeIn) : '08:00';
  var tOut = existing ? normaliseTime(existing.timeOut) : (dn === 'Fri' ? '16:00' : '17:00');
  var status = existing ? (existing.status || 'present') : 'present';
  var hrs = existing ? (existing.hoursWorked || '') : '';
  var existId = existing ? (existing.id || existing.rowId || '') : '';

  var statusOpts = ['present','late','absent','leave','ph','off'].map(function(s) {
    return '<option value="' + s + '"' + (status === s ? ' selected' : '') + '>' + s.charAt(0).toUpperCase() + s.slice(1) + '</option>';
  }).join('');

  var deleteBtn = existing ? '<button class="btn btn-danger" onclick="deleteAttendance(\'' + existId + '\',\'' + ptCode + '\',\'' + dateStr + '\')">Delete</button>' : '';

  openModal(
    '<h3>Attendance &mdash; ' + (emp.fullName || ptCode) + '</h3>' +
    '<p style="font-size:.8rem;color:var(--gray);margin-bottom:12px">' + dn + ' ' + dateStr + '</p>' +
    '<div class="form-row"><label>Status</label><select id="attStatus">' + statusOpts + '</select></div>' +
    '<div class="form-row"><label>Time In</label><input type="time" id="attTimeIn" value="' + tIn + '"></div>' +
    '<div class="form-row"><label>Time Out</label><input type="time" id="attTimeOut" value="' + tOut + '"></div>' +
    '<div class="form-row"><label>Hours Worked (auto if blank)</label><input type="number" step="0.25" id="attHours" value="' + hrs + '" placeholder="Auto-calculated"></div>' +
    '<div class="form-actions">' +
      '<button class="btn btn-secondary" onclick="forceCloseModal()">Cancel</button>' +
      deleteBtn +
      '<button class="btn btn-primary" onclick="saveAttendance(\'' + ptCode + '\',\'' + dateStr + '\',\'' + existId + '\')">Save</button>' +
    '</div>'
  );
}

function saveAttendance(ptCode, dateStr, existingId) {
  var status = $('#attStatus').value;
  var timeIn = $('#attTimeIn').value;
  var timeOut = $('#attTimeOut').value;
  var dn = dayName(dateStr);
  var hours = parseFloat($('#attHours').value);
  if (isNaN(hours) || hours === 0) {
    hours = calcHoursWorked(timeIn, timeOut, dn);
  }
  var entry = { ptCode: ptCode, date: dateStr, status: status, timeIn: timeIn, timeOut: timeOut, hoursWorked: hours };

  var action = existingId ? 'updateEntry' : 'addEntry';
  var data = Object.assign({ register: 'attendance' }, entry);
  if (existingId) data.id = existingId;

  apiCall(action, data)
  .then(function() {
    var idx = registers.attendance.findIndex(function(a) { return (a.ptCode === ptCode || a.employeeId === ptCode) && a.date === dateStr; });
    if (idx >= 0) registers.attendance[idx] = Object.assign({}, registers.attendance[idx], entry);
    else registers.attendance.push(Object.assign({ id: existingId || Date.now() }, entry));
    registers.attendance = dedupeAttendance(registers.attendance);
    forceCloseModal();
    renderCurrentView();
    buildNav();
    toast('Attendance saved', 'success');
  })
  .catch(function(e) { toast('Error saving: ' + e.message, 'error'); });
}

function deleteAttendance(id, ptCode, dateStr) {
  if (!confirm('Delete this attendance record?')) return;
  apiCall('deleteEntry', { register: 'attendance', id: id })
  .then(function() {
    registers.attendance = registers.attendance.filter(function(a) {
      return !((a.ptCode === ptCode || a.employeeId === ptCode) && a.date === dateStr);
    });
    forceCloseModal();
    renderCurrentView();
    toast('Deleted', 'success');
  })
  .catch(function(e) { toast('Error: ' + e.message, 'error'); });
}

function markAllPresent() {
  var weekDates = getWeekDates(currentWeekStart);
  var todayStr = today();
  var dateStr = weekDates.indexOf(todayStr) !== -1 ? todayStr : weekDates[0];
  var dn = dayName(dateStr);
  var defaultOut = dn === 'Fri' ? '16:00' : '17:00';
  var activeEmps = employees.filter(function(e) { return (e.status || '').toLowerCase() !== 'inactive'; });
  var toMark = [];

  activeEmps.forEach(function(emp) {
    var ptCode = emp.ptCode || emp.id || '';
    var existing = registers.attendance.find(function(a) {
      return (a.ptCode === ptCode || a.employeeId === ptCode) && a.date === dateStr;
    });
    // Skip if ANY record exists already
    if (existing) return;
    var hours = calcHoursWorked('08:00', defaultOut, dn);
    toMark.push({ ptCode: ptCode, date: dateStr, status: 'present', timeIn: '08:00', timeOut: defaultOut, hoursWorked: hours });
  });

  if (toMark.length === 0) {
    toast('All employees already marked for ' + dateStr, 'info');
    return;
  }

  var done = 0;
  var total = toMark.length;
  toast('Marking ' + total + ' employees present...', 'info');

  function markNext(i) {
    if (i >= toMark.length) {
      registers.attendance = dedupeAttendance(registers.attendance);
      renderCurrentView();
      toast('Marked ' + done + ' employees present for ' + dateStr, 'success');
      return;
    }
    var entry = toMark[i];
    apiCall('addEntry', Object.assign({ register: 'attendance' }, entry))
    .then(function() {
      registers.attendance.push(Object.assign({ id: Date.now() + i }, entry));
      done++;
      markNext(i + 1);
    })
    .catch(function() {
      markNext(i + 1);
    });
  }
  markNext(0);
}

function printAttendanceSheet() {
  var weekDates = getWeekDates(currentWeekStart);
  var activeEmps = employees.filter(function(e) { return (e.status || '').toLowerCase() !== 'inactive'; });
  var rows = '';
  activeEmps.forEach(function(emp, i) {
    var ptCode = emp.ptCode || emp.id || '';
    var cells = '';
    weekDates.forEach(function(d) {
      var att = registers.attendance.find(function(a) { return (a.ptCode === ptCode || a.employeeId === ptCode) && a.date === d; });
      var val = att ? (att.status || 'P').toUpperCase().slice(0, 1) : '';
      cells += '<td style="padding:6px;border:1px solid #ccc;text-align:center;min-width:50px">' + val + '</td>';
    });
    rows += '<tr><td style="padding:6px;border:1px solid #ccc">' + (i + 1) + '</td><td style="padding:6px;border:1px solid #ccc;white-space:nowrap">' + (emp.fullName || ptCode) + '</td>' + cells + '<td style="padding:6px;border:1px solid #ccc;min-width:80px"></td></tr>';
  });

  var headerCells = weekDates.map(function(d, i) {
    return '<th style="padding:6px;border:1px solid #ccc">' + DAYS_ORDER[i] + '<br>' + fmtDateShort(d) + '</th>';
  }).join('');

  var html = '<!DOCTYPE html><html><head><title>Attendance Sheet</title><style>body{font-family:sans-serif;font-size:10pt;margin:10mm}table{border-collapse:collapse;width:100%}@page{size:landscape;margin:10mm}</style></head><body>' +
    '<h2>Pullen\'s Tombstones &mdash; Attendance Sheet</h2>' +
    '<p>Week: ' + fmtDateShort(currentWeekStart) + ' &mdash; ' + fmtDateShort(getWeekEnd(currentWeekStart)) + '</p>' +
    '<table><thead><tr><th style="padding:6px;border:1px solid #ccc">#</th><th style="padding:6px;border:1px solid #ccc;text-align:left">Employee</th>' + headerCells + '<th style="padding:6px;border:1px solid #ccc">Signature</th></tr></thead><tbody>' + rows + '</tbody></table></body></html>';
  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  w.print();
}

function updatePCRecipient() {

    description: $('#pcDesc').value,

  .then(function() {

function initSignatureCanvas(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * 2;
  canvas.height = rect.height * 2;
  ctx.scale(2, 2);
  ctx.strokeStyle = '#1C1917';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  var drawing = false;
  var lastX = 0, lastY = 0;

  function getPos(e) {
    var r = canvas.getBoundingClientRect();
    var touch = e.touches ? e.touches[0] : e;
    return [touch.clientX - r.left, touch.clientY - r.top];
  }
  function start(e) { drawing = true; var p = getPos(e); lastX = p[0]; lastY = p[1]; e.preventDefault(); }
  function move(e) {
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p[0], p[1]); ctx.stroke();
    lastX = p[0]; lastY = p[1]; e.preventDefault();
  }
  function end() { drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
  signOffCanvases[canvasId] = { canvas: canvas, ctx: ctx };
}

function clearSignature(canvasId) {
  var c = signOffCanvases[canvasId];
  if (c) c.ctx.clearRect(0, 0, c.canvas.width, c.canvas.height);
}

function skipSignOff() {

function confirmSignOff(canvasId) {
