<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1E3A8A">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pullens">
<title>Pullens Admin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2212%22%20fill%3D%22%231E3A8A%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%25%22%20font-family%3D%22Georgia%2Cserif%22%20font-weight%3D%22bold%22%20font-size%3D%2244%22%20fill%3D%22white%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22central%22%3EP%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PULLENS ADMIN v4.2 · MOBILE-FIRST RESPONSIVE
   ============================================================ */
:root {
  --cream:#FBF8F3; --paper:#F5F1E8; --ivory:#FFFEFB; --ink:#1C1917; --ink-2:#3F3A36;
  --muted:#78716C; --muted-2:#A8A29E; --line:#E7E0D2; --line-2:#D6CCB7;
  --blue:#1E3A8A; --blue-2:#2547B0; --blue-soft:#E0E7F5; --blue-softer:#EDF1F9; --blue-dark:#142560; --blue-glow:rgba(30,58,138,0.22);
  --amber:#B45309; --amber-soft:#FEF3E2; --red:#991B1B; --red-soft:#FEE8E8; --green:#166534; --green-soft:#E6F4EA;
  --tint-sage:#E8F0E5; --tint-cream:#FAF3E3; --tint-rose:#F5E3DD; --tint-slate:#E5EAF0; --tint-amber:#F7E8CD; --tint-blue:#DEE7F5;
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px;
  --sh-xs:0 1px 2px rgba(28,25,23,.04);
  --sh-sm:0 1px 2px rgba(28,25,23,.04),0 2px 6px rgba(28,25,23,.03);
  --sh-md:0 2px 4px rgba(28,25,23,.04),0 8px 20px rgba(28,25,23,.06);
  --sh-lg:0 4px 8px rgba(28,25,23,.04),0 20px 40px rgba(28,25,23,.08);
  --f-display:'Fraunces',Georgia,serif; --f-body:'Inter Tight',-apple-system,sans-serif; --f-mono:'JetBrains Mono',monospace;
  --tap:48px; /* minimum touch target */
}
[data-theme="dark"] {
  --cream:#0B0A09; --paper:#151311; --ivory:#1B1815; --ink:#F4EDE0; --ink-2:#C9C2B4;
  --muted:#928A7E; --muted-2:#6C665D; --line:#2A2622; --line-2:#3A342E;
  --blue:#7FA6EC; --blue-soft:#19273F; --blue-softer:#10182A; --blue-dark:#C1D3F5; --blue-glow:rgba(127,166,236,.28);
  --tint-sage:#162518; --tint-cream:#231C0E; --tint-rose:#28160F; --tint-slate:#151A23; --tint-amber:#2A1E0B; --tint-blue:#0F1828;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { min-height:100vh; overscroll-behavior:none; }
body { font-family:var(--f-body); font-size:16px; line-height:1.55; color:var(--ink); background:var(--cream); -webkit-font-smoothing:antialiased; }
button { font-family:inherit; cursor:pointer; border:0; background:none; color:inherit; transition:all .18s cubic-bezier(.22,.61,.36,1); min-height:var(--tap); min-width:var(--tap); }
input, select, textarea {
  font-family:inherit; font-size:16px; color:var(--ink); background:var(--ivory);
  border:1px solid var(--line); border-radius:var(--r-sm);
  padding:14px 16px;
  min-height:var(--tap);
  width:100%;
  -webkit-appearance:none; appearance:none;
}
input[type="time"], input[type="date"], input[type="number"] {
  font-family:var(--f-mono);
  letter-spacing:0.02em;
}
input:focus, select:focus, textarea:focus {
  outline:2px solid var(--blue); outline-offset:0; border-color:transparent;
}
.mono, .num { font-family:var(--f-mono); font-variant-numeric:tabular-nums; letter-spacing:-0.01em; }
label.form-label { display:block; font-size:12px; font-weight:700; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; }

/* ============ ANIMATIONS ============ */
@keyframes fadeInUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes scaleIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
@keyframes slideInRight { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
@keyframes popIn { 0% { transform:scale(.8); opacity:0; } 70% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
.anim-fade { animation:fadeInUp .35s cubic-bezier(.22,.61,.36,1) both; }
.anim-slide { animation:slideInRight .3s cubic-bezier(.22,.61,.36,1) both; }
.anim-pop { animation:popIn .3s cubic-bezier(.22,.61,.36,1) both; }
.anim-stagger > * { animation:fadeInUp .35s cubic-bezier(.22,.61,.36,1) both; }
.anim-stagger > *:nth-child(1) { animation-delay:0ms; }
.anim-stagger > *:nth-child(2) { animation-delay:50ms; }
.anim-stagger > *:nth-child(3) { animation-delay:100ms; }
.anim-stagger > *:nth-child(4) { animation-delay:150ms; }
.anim-stagger > *:nth-child(5) { animation-delay:200ms; }
.anim-stagger > *:nth-child(6) { animation-delay:250ms; }
.btn:active { transform:scale(.95) !important; }
.btn.primary:active { transform:scale(.95) !important; filter:brightness(1.1); }
.skeleton { background:linear-gradient(90deg, var(--paper) 25%, var(--line) 50%, var(--paper) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:var(--r-sm); height:20px; }
.loading-screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--cream); z-index:2000; }
.loading-logo { font-family:var(--f-display); font-size:36px; font-weight:700; color:var(--blue); animation:popIn .5s both; }
.loading-tag { font-size:12px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-top:8px; animation:fadeIn .5s .3s both; }
.loading-bar { width:120px; height:3px; background:var(--line); border-radius:2px; margin-top:20px; overflow:hidden; animation:fadeIn .5s .5s both; }
.loading-bar-fill { height:100%; background:var(--blue); border-radius:2px; animation:loadFill 2s .5s cubic-bezier(.22,.61,.36,1) both; }
@keyframes loadFill { from { width:0; } to { width:100%; } }
.helper-text { font-size:12px; color:var(--muted); font-style:italic; padding:8px 12px; background:var(--blue-softer); border-left:3px solid var(--blue); border-radius:0 var(--r-sm) var(--r-sm) 0; margin-bottom:12px; line-height:1.4; }

/* ============ LOGIN ============ */
.login-bg { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(180deg,var(--cream) 0%,var(--paper) 100%); z-index:1000; }
.login-card { background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-xl); box-shadow:var(--sh-lg); padding:32px 24px; width:100%; max-width:420px; text-align:center; }
.login-logo { width:140px; margin:0 auto 12px; display:block; }
.login-tag { font-family:var(--f-display); font-style:italic; font-size:11px; letter-spacing:0.28em; color:var(--muted-2); text-transform:uppercase; margin-bottom:24px; font-variant:small-caps; }
.login-tag::before, .login-tag::after { content:''; display:inline-block; width:20px; height:1px; background:var(--line-2); vertical-align:middle; margin:0 8px; }
.user-pick { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:18px; }
.user-btn { padding:14px 10px; background:var(--cream); border:2px solid transparent; border-radius:var(--r-md); font-weight:600; font-size:15px; color:var(--ink-2); min-height:56px; }
.user-btn:hover, .user-btn:active { background:var(--ivory); border-color:var(--line-2); }
.user-btn.active { background:var(--blue-softer); border-color:var(--blue); color:var(--blue); }
.pin-dots { display:flex; gap:12px; justify-content:center; margin:20px 0; }
.pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--line-2); transition:all .12s; }
.pin-dot.filled { background:var(--blue); border-color:var(--blue); transform:scale(1.1); }
.pin-dot.wrong { background:var(--red); border-color:var(--red); animation:shake .35s; }
@keyframes shake { 25%{transform:translateX(-8px);} 50%{transform:translateX(8px);} 75%{transform:translateX(-4px);} }
.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:300px; margin:0 auto; }
.key { padding:18px 0; background:var(--cream); border-radius:var(--r-md); font-size:24px; font-weight:500; font-family:var(--f-mono); color:var(--ink); min-height:60px; }
.key:active { background:var(--line); transform:scale(.96); }
.key.fn { background:transparent; font-size:14px; font-weight:600; color:var(--muted); }
.login-hint { color:var(--muted); font-size:13px; margin-top:16px; }

/* ============ APP SHELL — MOBILE FIRST ============ */
.app { display:none; flex-direction:column; min-height:100vh; }
.app.active { display:flex; }

/* MOBILE SIDEBAR — hidden by default, slides in */
.sidebar {
  position:fixed; top:0; left:0; bottom:0;
  width:280px; max-width:85vw;
  background:var(--ivory); border-right:1px solid var(--line);
  transform:translateX(-100%);
  transition:transform .25s cubic-bezier(.22,.61,.36,1);
  z-index:200;
  display:flex; flex-direction:column;
  box-shadow:var(--sh-lg);
}
.sidebar.open { transform:translateX(0); }
.sb-backdrop {
  position:fixed; inset:0; background:rgba(28,25,23,.4); backdrop-filter:blur(2px);
  opacity:0; pointer-events:none; transition:opacity .25s; z-index:190;
}
.sb-backdrop.open { opacity:1; pointer-events:all; }
.sb-head { padding:18px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; }
.sb-logo-wrap { background:#fff; border-radius:10px; padding:6px 10px; box-shadow:var(--sh-xs); flex:1; }
.sb-logo { width:100%; max-height:40px; object-fit:contain; display:block; }
.sb-close-btn { width:36px; height:36px; border-radius:8px; background:var(--paper); color:var(--muted); font-size:18px; display:grid; place-items:center; flex-shrink:0; }
.sb-nav { flex:1; overflow-y:auto; padding:10px 8px; -webkit-overflow-scrolling:touch; }
.sb-section { font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted-2); padding:12px 10px 6px; }
.sb-item { display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:10px; font-size:15px; font-weight:500; color:var(--ink-2); cursor:pointer; min-height:var(--tap); margin-bottom:2px; }
.sb-item:hover, .sb-item:active { background:var(--paper); color:var(--ink); }
.sb-item.active { background:var(--blue); color:#fff; }
.sb-item .sb-icon { width:22px; text-align:center; font-size:16px; opacity:.7; }
.sb-item.active .sb-icon { opacity:1; }
.sb-item .sb-count { margin-left:auto; font-family:var(--f-mono); font-size:12px; padding:2px 8px; background:var(--paper); border-radius:4px; font-weight:600; color:var(--muted); }
.sb-item.active .sb-count { background:rgba(255,255,255,.2); color:#fff; }
.sb-foot { padding:12px; border-top:1px solid var(--line); }
.sb-user { display:flex; align-items:center; gap:10px; padding:10px; border-radius:var(--r-sm); cursor:pointer; }
.sb-user:hover { background:var(--paper); }
.sb-avatar { width:36px; height:36px; border-radius:50%; background:var(--blue); color:#fff; display:grid; place-items:center; font-weight:700; font-size:14px; flex-shrink:0; }
.sb-user-name { font-weight:600; font-size:14px; line-height:1.2; }
.sb-user-role { font-size:11px; color:var(--muted); text-transform:uppercase; }
.sb-logout { margin-left:auto; font-size:12px; padding:6px 10px; border-radius:6px; color:var(--muted); }
.sb-logout:active { background:var(--red-soft); color:var(--red); }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; width:100%; }
.topbar {
  padding:14px 16px;
  background:var(--ivory); border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:12px;
}
.menu-btn { width:42px; height:42px; border-radius:10px; background:var(--paper); color:var(--ink); font-size:20px; display:grid; place-items:center; }
.topbar-title { flex:1; min-width:0; }
.topbar-title h1 { font-family:var(--f-display); font-size:22px; font-weight:700; line-height:1.1; letter-spacing:-0.3px; }
.topbar-title .sub { font-size:11px; color:var(--muted); margin-top:2px; }
.topbar-tools { display:flex; gap:6px; flex-shrink:0; }
.icon-btn { width:42px; height:42px; border-radius:10px; background:var(--paper); color:var(--ink-2); font-size:16px; display:grid; place-items:center; }
.icon-btn:active { background:var(--line); }
.sync-pill {
  display:inline-flex; align-items:center; gap:6px;
  font-size:11px; color:var(--muted); font-weight:500;
  padding:6px 10px; background:var(--paper); border-radius:999px;
  min-height:auto;
}
.sync-d { width:7px; height:7px; border-radius:50%; background:var(--green); }
.sync-d.syncing { background:var(--blue); animation:syncpulse 1s infinite; }
.sync-d.offline { background:var(--amber); }
@keyframes syncpulse { 0%,100%{opacity:.4;} 50%{opacity:1;} }

.content { padding:16px; padding-bottom:88px; /* room for bottom bar */ max-width:1600px; margin:0 auto; width:100%; }

/* GREETING STRIP */
.greet {
  font-size:12px; color:var(--muted); font-weight:500; display:flex; align-items:center; gap:8px;
  margin-bottom:4px;
}
.greet .dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(22,101,52,.5);} 70%{box-shadow:0 0 0 9px rgba(22,101,52,0);} 100%{box-shadow:0 0 0 0 rgba(22,101,52,0);} }
.hero-h { font-family:var(--f-display); font-size:28px; font-weight:700; letter-spacing:-0.5px; line-height:1.05; margin-bottom:2px; }
.hero-h em { font-style:italic; color:var(--blue); font-weight:500; }
.hero-sub { color:var(--muted); font-size:13px; }
.hero-chips { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
.chip { font-size:11px; padding:7px 10px; background:var(--ivory); border:1px solid var(--line); border-radius:999px; color:var(--ink-2); display:inline-flex; align-items:center; gap:6px; font-weight:500; }
.chip .dot { width:6px; height:6px; border-radius:50%; }
.chip strong { font-family:var(--f-mono); color:var(--ink); font-weight:700; }

/* KPI cards — mobile stack, desktop bento */
.kpis { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px; margin-bottom:20px; }
.kpi {
  background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-lg);
  padding:14px 16px; box-shadow:var(--sh-xs);
  position:relative; overflow:hidden; cursor:pointer;
}
.kpi:active { transform:scale(0.98); }
.kpi-ico { width:30px; height:30px; border-radius:8px; background:var(--blue-soft); color:var(--blue); display:grid; place-items:center; font-weight:700; font-size:12px; margin-bottom:10px; }
.kpi-label { font-size:10px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }
.kpi-val { font-family:var(--f-display); font-weight:700; font-size:24px; letter-spacing:-0.5px; line-height:1; margin-top:4px; }
.kpi-val .unit { font-family:var(--f-mono); font-size:12px; color:var(--muted); font-weight:500; margin-left:4px; }
.kpi-sub { font-size:11px; color:var(--muted); margin-top:4px; font-style:italic; }
.kpi.tint-sage { background:var(--tint-sage); }
.kpi.tint-cream { background:var(--tint-cream); }
.kpi.tint-rose { background:var(--tint-rose); }
.kpi.tint-slate { background:var(--tint-slate); }
.kpi.tint-amber { background:var(--tint-amber); }
.kpi.tint-blue { background:var(--tint-blue); }
.kpi.feat { grid-column:span 2; background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%); color:#fff; border:0; }
.kpi.feat .kpi-ico { background:rgba(255,255,255,.18); color:#fff; }
.kpi.feat .kpi-label { color:rgba(255,255,255,.72); }
.kpi.feat .kpi-val { color:#fff; font-size:32px; }
.kpi.feat .kpi-sub { color:rgba(255,255,255,.82); }

/* QUICK ACTIONS */
.qa-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:24px; }
.qa {
  padding:14px; background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-md);
  display:flex; align-items:center; gap:10px; font-weight:600; font-size:13px;
  min-height:56px; cursor:pointer;
}
.qa:active { background:var(--blue-softer); border-color:var(--blue); color:var(--blue); transform:scale(0.98); }
.qa-ico { width:32px; height:32px; border-radius:8px; background:var(--blue-soft); color:var(--blue); display:grid; place-items:center; font-weight:700; flex-shrink:0; }

/* PANELS */
.panel { background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-lg); padding:16px 18px; box-shadow:var(--sh-xs); margin-bottom:14px; }
.panel-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:12px; flex-wrap:wrap; }
.panel-title { font-family:var(--f-display); font-size:18px; font-weight:700; letter-spacing:-0.3px; }
.panel-sub { font-size:12px; color:var(--muted); font-style:italic; margin-top:2px; }
.panel-actions { display:flex; gap:6px; flex-wrap:wrap; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; gap:6px; padding:12px 18px; background:var(--ivory); color:var(--ink); border:1px solid var(--line); border-radius:var(--r-sm); font-size:14px; font-weight:600; min-height:var(--tap); }
.btn:active { background:var(--paper); transform:scale(0.97); }
.btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
.btn.primary:active { background:var(--blue-dark); }
.btn.danger { color:var(--red); }

/* TABLES — mobile-friendly (card layout on mobile) */
.tbl { background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-md); overflow:hidden; }
.tbl-head, .tbl-row {
  display:grid; gap:10px; padding:12px 14px; align-items:center;
  border-bottom:1px solid var(--line); font-size:13px;
}
.tbl-row:last-child { border-bottom:0; }
.tbl-row:active { background:var(--paper); }
.tbl-head { background:var(--paper); font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); }

/* FLAGS */
.flag { font-size:10px; padding:3px 8px; border-radius:999px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; display:inline-block; }
.flag.ok { background:var(--green-soft); color:var(--green); }
.flag.warn { background:var(--amber-soft); color:var(--amber); }
.flag.alert { background:var(--red-soft); color:var(--red); }
.flag.neutral { background:var(--paper); color:var(--muted); }

/* AVATAR GRID */
.avs { display:grid; grid-template-columns:repeat(auto-fill,minmax(60px,1fr)); gap:10px; }
.av { aspect-ratio:1; border-radius:50%; background:var(--paper); display:grid; place-items:center; cursor:pointer; position:relative; }
.av:active { transform:scale(0.95); }
.av-inner { width:calc(100% - 6px); height:calc(100% - 6px); border-radius:50%; background:var(--ivory); display:grid; place-items:center; font-weight:700; font-size:14px; color:var(--ink-2); overflow:hidden; }
.av-inner img { width:100%; height:100%; object-fit:cover; }
.av.p { background:linear-gradient(135deg,#34D399,#10B981); }
.av.late { background:linear-gradient(135deg,#FBBF24,#D97706); }
.av.a { background:linear-gradient(135deg,#F87171,#DC2626); }
.av.leave { background:var(--line-2); }
.av.unmarked { background:var(--line); }

/* DAILY REGISTER — TABLET-FRIENDLY GRID */
.reg-nav { display:flex; align-items:center; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.reg-week { font-family:var(--f-display); font-weight:600; font-size:15px; flex:1; min-width:180px; position:relative; }
.reg-grid-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-md); padding:4px; }
.reg-grid { display:grid; grid-template-columns:140px repeat(6, minmax(84px, 1fr)); gap:2px; min-width:640px; }
.reg-head-row, .reg-name-row { display:contents; }
.reg-cell-head { background:var(--paper); padding:10px 6px; text-align:center; font-size:10px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); border-radius:6px; }
.reg-cell-head.today { background:var(--blue-soft); color:var(--blue); }
.reg-name { padding:10px 12px; font-size:13px; font-weight:600; line-height:1.2; display:flex; align-items:center; background:var(--cream); border-radius:6px; }
.reg-cell { padding:8px 6px; cursor:pointer; display:flex; flex-direction:column; gap:2px; align-items:center; justify-content:center; min-height:58px; border-radius:6px; background:var(--cream); }
.reg-cell:active { transform:scale(0.95); }
.reg-cell.p { background:#E8F5ED; }
.reg-cell.late { background:#FFF5D6; }
.reg-cell.a { background:#FDE5E5; }
.reg-cell.leave { background:var(--paper); color:var(--muted); }
.reg-cell.ph { background:var(--blue-soft); color:var(--blue); font-weight:700; }
.reg-cell-time { font-family:var(--f-mono); font-size:11px; font-weight:600; }
.reg-cell-status { font-size:9px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); }
.reg-cell.p .reg-cell-status { color:#0F5132; }
.reg-cell.late .reg-cell-status { color:#7A4E00; }
.reg-cell.a .reg-cell-status { color:#8A1F1F; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(28,25,23,.5); backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center; z-index:600; padding:0; }
.modal-bg.open { display:flex; }
.modal {
  background:var(--ivory);
  width:100%;
  max-height:92vh;
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:24px 20px 32px;
  box-shadow:var(--sh-lg);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  animation:modalIn .28s cubic-bezier(.22,.61,.36,1);
}
@keyframes modalIn { from { transform:translateY(100%); } }
.modal::before {
  content:''; display:block; width:40px; height:4px; background:var(--line-2); border-radius:2px; margin:-8px auto 18px;
}
.modal h2 { font-family:var(--f-display); font-size:22px; font-weight:700; margin-bottom:4px; letter-spacing:-0.3px; }
.modal .modal-sub { font-family:var(--f-display); font-style:italic; color:var(--muted); margin-bottom:18px; font-size:14px; }
.form-grid { display:grid; grid-template-columns:1fr; gap:12px; }
.form-grid .half { }
.form-grid .full { }
.modal-foot { display:flex; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--line); }
.modal-foot button { flex:1; }

/* TOAST */
.toast { position:fixed; top:calc(env(safe-area-inset-top) + 16px); left:50%; transform:translateX(-50%) translateY(-120%); background:var(--ink); color:#fff; padding:12px 18px; border-radius:var(--r-md); font-size:13px; font-weight:600; box-shadow:var(--sh-lg); transition:transform .3s cubic-bezier(.22,.61,.36,1); z-index:700; max-width:calc(100vw - 32px); text-align:center; }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { background:var(--green); }
.toast.danger { background:var(--red); }

/* DRAWER (employee profile) — full screen on mobile */
.drawer-bg { position:fixed; inset:0; background:rgba(28,25,23,.5); backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .24s; z-index:300; }
.drawer-bg.open { opacity:1; pointer-events:all; }
.drawer { position:fixed; top:0; right:0; bottom:0; width:100%; max-width:520px; background:var(--cream); transform:translateX(100%); transition:transform .3s cubic-bezier(.22,.61,.36,1); z-index:400; display:flex; flex-direction:column; overflow:hidden; }
.drawer.open { transform:translateX(0); }
.drawer-head { padding:20px 22px; background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%); color:#fff; position:relative; }
.drawer-close { position:absolute; right:12px; top:12px; width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.14); color:#fff; font-size:18px; display:grid; place-items:center; }
.drawer-photo { width:68px; height:68px; border-radius:50%; background:rgba(255,255,255,.14); display:grid; place-items:center; font-weight:700; font-size:24px; margin-bottom:14px; overflow:hidden; cursor:pointer; position:relative; }
.drawer-photo img { width:100%; height:100%; object-fit:cover; }
.drawer-photo .cam-badge { position:absolute; bottom:-2px; right:-2px; background:#fff; color:var(--blue); width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-size:12px; box-shadow:var(--sh-sm); }
.drawer-code { font-family:var(--f-mono); font-size:10px; font-weight:700; letter-spacing:0.08em; color:rgba(255,255,255,.78); text-transform:uppercase; margin-bottom:6px; }
.drawer-name { font-family:var(--f-display); font-size:22px; font-weight:700; letter-spacing:-0.3px; }
.drawer-role { font-style:italic; opacity:.85; margin-top:4px; font-size:13px; }
.drawer-body { flex:1; overflow-y:auto; padding:16px 18px 100px; -webkit-overflow-scrolling:touch; }
.drawer-sect { background:var(--ivory); border:1px solid var(--line); border-radius:var(--r-md); padding:14px 16px; margin-bottom:10px; }
.drawer-sect h3 { font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.drow { display:flex; gap:10px; padding:7px 0; font-size:14px; }
.drow:not(:last-child) { border-bottom:1px solid var(--line); }
.drow .k { font-size:12px; color:var(--muted); min-width:120px; font-weight:500; }
.drow .v { color:var(--ink); font-weight:500; flex:1; word-break:break-word; }
.drow .v.mono { font-family:var(--f-mono); font-weight:600; }
.drow .v.missing { color:var(--red); font-style:italic; }
.drawer-actions { padding:14px 18px; background:var(--ivory); border-top:1px solid var(--line); display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.drawer-actions button { font-size:12px; font-weight:600; padding:12px 10px; min-height:var(--tap); }

/* ============ RESPONSIVE — TABLET & DESKTOP ============ */
@media (min-width: 768px) {
  .app { flex-direction:row; }
  .sidebar { position:sticky; top:0; height:100vh; transform:translateX(0); box-shadow:none; width:240px; }
  .sb-backdrop { display:none; }
  .menu-btn { display:none; }
  .sb-close-btn { display:none; }
  .content { padding:24px; }
  .kpis { grid-template-columns:repeat(4,1fr); }
  .kpi.feat { grid-column:span 2; }
  .qa-grid { grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); }
  .topbar-title h1 { font-size:28px; }
  .modal-bg { align-items:center; padding:20px; }
  .modal { max-width:620px; border-radius:var(--r-xl); max-height:85vh; }
  .modal::before { display:none; }
  .form-grid { grid-template-columns:1fr 1fr; }
  .form-grid .full { grid-column:1/-1; }
  .drawer { width:520px; }
  .toast { top:20px; }
}

@media (min-width: 1100px) {
  .kpis { grid-template-columns:repeat(6,1fr); grid-auto-rows:140px; }
  .kpi.feat { grid-column:span 3; grid-row:span 2; }
  .kpi.big { grid-column:span 2; }
}

/* Bottom nav shortcuts (mobile only) */
.bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  background:var(--ivory); border-top:1px solid var(--line);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  display:grid; grid-template-columns:repeat(5,1fr); gap:4px;
  z-index:50;
  box-shadow:0 -4px 16px rgba(28,25,23,0.05);
}
.bb-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px; border-radius:8px; cursor:pointer; min-height:56px; }
.bb-item:active { background:var(--paper); }
.bb-item.active { color:var(--blue); }
.bb-ico { font-size:18px; }
.bb-label { font-size:10px; font-weight:600; }
@media (min-width: 768px) { .bottom-bar { display:none; } .content { padding-bottom:32px; } }

/* TAB CONTENTS */
.tab { display:none; }
.tab.active { display:block; animation:fadeInUp .24s cubic-bezier(.22,.61,.36,1); }
@keyframes fadeInUp { from { transform:translateY(6px); opacity:0; } }

/* EMPTY STATE */
.empty { text-align:center; padding:48px 20px; }
.empty-ico { width:64px; height:64px; margin:0 auto 14px; border-radius:50%; background:var(--blue-soft); color:var(--blue); display:grid; place-items:center; font-size:26px; font-weight:700; }
.empty h3 { font-family:var(--f-display); font-size:20px; font-weight:700; margin-bottom:6px; }
.empty p { color:var(--muted); max-width:420px; margin:0 auto 20px; font-size:14px; }
</style>
</head>

// Normalise Sheets time values → "HH:mm"
function normTime(v) {
  if (!v && v !== 0) return '';
  // Already HH:mm
  if (typeof v === 'string' && /^\d{2}:\d{2}$/.test(v)) return v;
  // Sheets serial fraction (0.333 = 08:00)
  if (typeof v === 'number' && v >= 0 && v < 1) {
    const totalMin = Math.round(v * 24 * 60);
    const h = Math.floor(totalMin / 60) % 24;
    const m = totalMin % 60;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  // Bare number like 830 or 1700
  if (typeof v === 'number' && v >= 100 && v <= 2359) {
    const h = Math.floor(v / 100);
    const m = v % 100;
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  const s = String(v);
  // String like "830" or "1700" (no colon)
  if (/^\d{3,4}$/.test(s)) {
    const h = s.length === 3 ? s[0] : s.slice(0,2);
    const m = s.length === 3 ? s.slice(1) : s.slice(2);
    return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
  }
  // Sheets epoch datetime (1899-12-30T06:00:00.000Z) — UTC, convert to SAST (+2)
  if (s.includes('1899-12-30') || (s.includes('T') && s.includes('Z'))) {
    const m2 = s.match(/T(\d{2}):(\d{2})/);
    if (m2) {
      let h = parseInt(m2[1]) + 2;
      if (h >= 24) h -= 24;
      return String(h).padStart(2,'0') + ':' + m2[2];
    }
  }
  return s;
}
const fmtR = n => n == null || isNaN(n) ? '—' : 'R\u00A0' + Number(n).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtD = d => d ? new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}) : '—';
const fmtDShort = d => d ? new Date(d).toLocaleDateString('en-ZA',{weekday:'short',day:'numeric'}) : '—';
const today = () => { const d = new Date(); return iso(d); }; // local date, not UTC
const iso = d => {
  if (!d) return '';
  if (typeof d === 'string') {
    const m = d.match(/^(\d{4}-\d{2}-\d{2})/);
    if (m) return m[1]; // already YYYY-MM-DD — don't round-trip through Date (timezone safe)
  }
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt)) return '';
  const y = dt.getFullYear(), mo = String(dt.getMonth()+1).padStart(2,'0'), da = String(dt.getDate()).padStart(2,'0');
  return `${y}-${mo}-${da}`;
};
// _today_local removed — today() now uses local date directly
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const initials = n => (n||'??').split(' ').filter(w=>w.length>1).slice(0,2).map(w=>w[0]).join('').toUpperCase();
const greeting = () => { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; };

/* Current Fri→Thu week */
function lastFriday() {
  const d = new Date();
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = (day + 2) % 7; // days since last Fri
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d;
}
function weekDays(start) {
  /* Explicit Fri→Thu grid (6 cells): Fri, Sat(OT), Mon, Tue, Wed, Thu — Sunday excluded */
  const offsets = [0,1,3,4,5,6]; // days since Friday start
  const otIx = 1; // Saturday index
  return offsets.map((off, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + off);
    const isSat = (i === otIx);
    return {
      date: iso(d),
      label: isSat ? 'Sat (OT)' : d.toLocaleDateString('en-ZA',{weekday:'short',day:'numeric'}),
      today: iso(d) === today(),
      ot: isSat
    };
  });
}
APP.weekStart = lastFriday();
// Fri 08:00–16:00 (7.25hrs), Mon–Thu 08:00–17:00 (8.25hrs), Sat = all OT
function isFriday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 5; }
function isSaturday(dateStr) { return new Date(dateStr + 'T12:00:00').getDay() === 6; }
function dayDefaults(dateStr) {
  if (isSaturday(dateStr)) return { timeIn: '08:00', timeOut: '13:00', hoursWorked: 5, isOT: true }; // no break on 5hr shift per BCEA
  if (isFriday(dateStr)) return { timeIn: '08:00', timeOut: '16:00', hoursWorked: 7.25, isOT: false };
  return { timeIn: '08:00', timeOut: '17:00', hoursWorked: 8.25, isOT: false };
}

/* ============================================================
   BACKEND
   ============================================================ */
function setSync(s) {
  const d=document.getElementById('syncDot'); const t=document.getElementById('syncText');
  if (!d) return;
  d.className = 'sync-d ' + (s==='ok'?'':s);
  t.textContent = { syncing:'Syncing…', ok:'Synced', offline:'Offline' }[s] || 'Synced';
}
async function api(action, data) {
  setSync('syncing');
  try {
    const r = await fetch(BACKEND_URL, {
      method:'POST', mode:'cors', redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action, data:data||{}, user: APP.currentUser ? {id:APP.currentUser.id, pin:APP.currentUser.pin, token:APP.sessionToken||null} : null })
    });
    const j = await r.json();
    setSync(j.ok?'ok':'offline');
    return j;
  } catch(e) {
    setSync('offline');
    return { ok:false, error:'Offline: '+e.message };
  }
}

/* Map backend employee row → dashboard format */
function normEmp(e) {
  return {
    pt_code:e.ptCode, legacy_code:String(e.legacyCode||''), full_name:e.fullName,
    id_number:String(e.idNumber||''), cell:e.cell, home_address:e.homeAddress,
    gender:e.gender, race:e.race, disability:e.disability==='Yes',
    bank_name:e.bankName, bank_acc:String(e.bankAcc||''), bank_branch:String(e.bankBranch||''), bank_type:e.bankType,
    emergency_name:e.emergencyName, emergency_rel:e.emergencyRel, emergency_phone:e.emergencyPhone,
    occupation:e.occupation, weekly_wage:Number(e.weeklyWage)||0, status:e.status||'Active',
    start_date:e.startDate, garnishee:Number(e.garnishee)||0,
    eif_on_file:e.eifOnFile==='Yes', eif_signed:e.eifSigned==='Yes', eif_date:e.eifDate,
    notes:e.notes, photo:e.photo
  };
}
async function loadAll() {
  setSync('syncing');
  dismissError();
  const regs = ['overtime','loans','warnings','leave','medical','pettycash','attendance'];
  try {
    const calls = [ api('listEmployees'), ...regs.map(r => api('listRegister',{register:r})), api('getSettings') ];
    const results = await Promise.all(calls);
    const emp = results[0];
    if (!emp.ok) throw new Error(emp.error || 'Employees load failed');
    if (Array.isArray(emp.data)) {
      APP.employees = emp.data.filter(e=>e.ptCode).map(normEmp);
      APP.empMap = {}; APP.employees.forEach(e=>APP.empMap[e.pt_code]=e);
    }
    regs.forEach((reg, i) => {
      const r = results[i+1];
      if (r.ok && Array.isArray(r.data)) APP.registers[reg] = r.data;
    });
    // Normalise Sheets epoch times on attendance records
    APP.registers.attendance.forEach(a => {
      if (a.timeIn) a.timeIn = normTime(a.timeIn);
      if (a.timeOut) a.timeOut = normTime(a.timeOut);
    });
    // Load settings from backend
    const settingsResult = results[regs.length + 1];
    if (settingsResult && settingsResult.ok && settingsResult.data) {
      APP.settings = { ...APP.settings, ...settingsResult.data };
    }
    // Pre-populate signSigned from backend (fix #10)
    try {
      const ws = iso(APP.weekStart);
      const sig = await api('listRegister',{register:'payslipSignatures'});
      if (sig.ok && Array.isArray(sig.data)) {
        sig.data.filter(s => iso(s.weekStart)===ws).forEach(s => signSigned.add(s.ptCode));
      }
    } catch(e) { /* non-fatal */ }
    setSync('ok');
    render();
  } catch(e) {
    setSync('offline');
    showError('Could not load data from backend: ' + e.message, loadAll);
  }
}
function showError(msg, retryFn) {
  let bar = document.getElementById('errorBar');
  if (!bar) {
    bar = document.createElement('div'); bar.id = 'errorBar';
    bar.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#991B1B;color:#fff;padding:12px 16px;z-index:9999;display:flex;align-items:center;gap:12px;font-size:14px;';
    document.body.appendChild(bar);
  }
  bar.innerHTML = '<span style="flex:1;">⚠ '+msg+'</span><button onclick="this.parentElement.remove();('+retryFn.name+')();" style="background:#fff;color:#991B1B;padding:6px 14px;border-radius:6px;font-weight:600;min-height:36px;">Retry</button>';
}
function dismissError() {
  const bar = document.getElementById('errorBar');
  if (bar) bar.remove();
}

/* ============================================================
   LOGIN
   ============================================================ */
let loginPin=''; let loginUser=null;
function renderLogin() {
  const p = document.getElementById('userPick');
  p.innerHTML = APP.users.map(u => `<button class="user-btn" data-u="${u.id}">${u.name.split(' ')[0]}</button>`).join('');
  p.querySelectorAll('.user-btn').forEach(b => b.onclick = ()=>{
    p.querySelectorAll('.user-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); loginUser = APP.users.find(x=>x.id===b.dataset.u);
    loginPin=''; renderDots();
  });
  const keys=['1','2','3','4','5','6','7','8','9','clear','0','ok'];
  const kp = document.getElementById('keypad');
  kp.innerHTML = keys.map(k => {
    if (k==='clear') return `<button class="key fn" data-k="clear">Clear</button>`;
    if (k==='ok') return `<button class="key fn" data-k="ok">✓</button>`;
    return `<button class="key" data-k="${k}">${k}</button>`;
  }).join('');
  kp.querySelectorAll('.key').forEach(b => b.onclick = () => {
    const k = b.dataset.k;
    if (k==='clear') { loginPin=''; renderDots(); }
    else if (k==='ok') { loginSubmit(); }
    else { loginType(k); }
  });
  renderDots();
}
function renderDots() {
  document.getElementById('pinDots').innerHTML = [0,1,2,3].map(i=>`<div class="pin-dot ${i<loginPin.length?'filled':''}"></div>`).join('');
}
function loginType(d) {
  if (!loginUser) { toast('Pick a user first','danger'); return; }
  if (loginPin.length<4) loginPin+=d; renderDots();
  if (loginPin.length===4) setTimeout(loginSubmit,120);
}
async function loginSubmit() {
  if (!loginUser) { toast('Pick a user first','danger'); return; }
  if (loginPin.length!==4) { toast('Enter 4-digit PIN','danger'); return; }
  const r = await api('login',{ userId:loginUser.id, pin:loginPin });
  if (r.ok) {
    // #3 Do NOT persist PIN. Store only non-sensitive identity.
    APP.currentUser = { ...r.data, pin: loginPin };
    APP.sessionToken = r.data.token || r.data.sessionToken || null; // backend should supply
    sessionStorage.setItem('pullens_user', JSON.stringify({
      id: APP.currentUser.id, name: APP.currentUser.name,
      role: APP.currentUser.role, perms: APP.currentUser.perms,
      pin: loginPin, token: APP.sessionToken
    }));
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('active');
    toast('Welcome, '+APP.currentUser.name.split(' ')[0],'success');
    await loadAll();
    initApp();
  } else {
    document.getElementById('pinDots').querySelectorAll('.pin-dot').forEach(d=>d.classList.add('wrong'));
    setTimeout(()=>{ loginPin=''; renderDots(); },400);
    toast(r.error||'Wrong PIN','danger');
  }
}
function logout() { sessionStorage.removeItem('pullens_user'); location.reload(); }

function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sbBackdrop').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbBackdrop').classList.remove('open'); }

/* ============================================================
   ROUTER
   ============================================================ */
function openView(v) {
  // #12 Frontend permission guard (backend still enforces authoritatively)
  const permsMap = { all: true, near: true,
    limited: ['overview','register','employees','medical'],
    payments: ['overview','payments','signoff'],
    pettycash: ['overview','pettycash'] };
  const u = APP.currentUser || {}; const allow = permsMap[u.perms];
  if (allow !== true && Array.isArray(allow) && !allow.includes(arguments[0])) {
    toast('No access','danger'); return;
  }
  APP.currentView = v;
  renderSidebar();
  document.querySelectorAll('.bb-item').forEach(b => b.classList.toggle('active', b.dataset.view===v));
  render();
  window.scrollTo({ top:0 });
}
function render() {
  updateTopbar();
  const m = document.getElementById('mainView');
  const v = APP.currentView;
  m.innerHTML = '';
  const tab = document.createElement('div'); tab.className='tab active';
  if (v==='overview') tab.innerHTML = viewOverview();
  else if (v==='employees') tab.innerHTML = viewEmployees();
  else if (v==='register') tab.innerHTML = viewRegister();
  else if (v==='overtime') tab.innerHTML = viewReg('Overtime','Pre-approved OT entries','overtime', 'modalOT', 'Log overtime');
  else if (v==='loans') tab.innerHTML = viewReg('Loans','Active loans · weekly deductions','loans', 'modalLoan', 'Grant loan');
  else if (v==='warnings') tab.innerHTML = viewReg('Warnings','Disciplinary record','warnings', 'modalWarning', 'Issue warning');
  else if (v==='leave') tab.innerHTML = viewReg('Leave','Annual · Sick · Family','leave', 'modalLeave', 'Log leave');
  else if (v==='medical') tab.innerHTML = viewReg('Doctor\'s notes','With photo · auto-filed','medical', 'modalMedical', 'Log certificate');
  else if (v==='pettycash') tab.innerHTML = viewPettyCash();
  else if (v==='payroll') tab.innerHTML = viewPayroll();
  else if (v==='signoff') tab.innerHTML = viewSignOff();
  else if (v==='payments') tab.innerHTML = viewPayments();
  else if (v==='documents') tab.innerHTML = viewDocuments();
  else if (v==='settings') tab.innerHTML = viewSettings();
  m.appendChild(tab);
}
function updateTopbar() {
  const titles = {
    overview:['Dashboard','The pulse of Pullens'],
    employees:['Employees',APP.employees.length + ' active'],
    register:["Who's at work","Tap cell → set time in / out"],
    overtime:['Overtime','Pre-approved, feeds payroll'],
    loans:['Loans','Weekly deductions'],
    warnings:['Warnings','Verbal 3m · Written 6m · Final 12m'],
    leave:['Leave','Annual · Sick · Family'],
    medical:["Doctor's notes","Photo auto-files to folder"],
    pettycash:['Petty cash','Thu 16:00 cutoff → Friday loan'],
    payroll:['Weekly payroll','Fri → Thu cycle'],
    signoff:['Sign & hand out','Employee signs · filed to Drive'],
    payments:['Payments','Mark paid · attach POP'],
    documents:['Forms','43 HR templates'],
    settings:['Settings','Users · PINs · backend'],
  };
  const [t,s] = titles[APP.currentView] || [APP.currentView,''];
  document.getElementById('topTitle').innerHTML = t;
  document.getElementById('topSub').textContent = s;
}

/* ============================================================
   VIEWS
   ============================================================ */
function viewOverview() {
  const activeEmps = APP.employees.filter(e => e.status === 'Active');
  const total = activeEmps.length;
  const totalWage = activeEmps.reduce((s,e)=>s+(e.weekly_wage||0),0);
  const loans = APP.registers.loans.filter(l => Number(l.outstanding)>0);
  const loanBal = loans.reduce((s,l)=>s+Number(l.outstanding||0),0);
  const weekStr = fmtDShort(iso(APP.weekStart)) + ' – ' + fmtDShort(iso(new Date(APP.weekStart.getTime() + 6*86400000)));
  return `
    <div class="greet"><span class="dot"></span>${greeting()}, ${APP.currentUser.name.split(' ')[0]} · ${new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'})}</div>
    <h1 class="hero-h">Dashboard <em>overview</em></h1>
    <div class="hero-sub">Pay cycle: ${weekStr}</div>
    <div class="kpis">
      <div class="kpi feat">
        <div class="kpi-ico">R</div>
        <div class="kpi-label">Weekly payroll (est.)</div>
        <div class="kpi-val">${fmtR(totalWage)}</div>
        <div class="kpi-sub">${total} employees · Fri → Thu</div>
      </div>
      <div class="kpi tint-sage big">
        <div class="kpi-ico">◉</div>
        <div class="kpi-label">Active headcount</div>
        <div class="kpi-val">${total}</div>
        <div class="kpi-sub">Allandale</div>
      </div>
      <div class="kpi tint-amber">
        <div class="kpi-ico">$</div>
        <div class="kpi-label">Outstanding loans</div>
        <div class="kpi-val">${fmtR(loanBal)}</div>
        <div class="kpi-sub">${loans.length} active</div>
      </div>
      <div class="kpi tint-rose">
        <div class="kpi-ico">△</div>
        <div class="kpi-label">Active warnings</div>
        <div class="kpi-val">${APP.registers.warnings.filter(w => {
          const days = w.type==='Verbal'?90 : w.type==='Written'?180 : 365;
          const age = (Date.now() - new Date(w.date||0).getTime())/(86400000);
          return age <= days;
        }).length}</div>
      </div>
      <div class="kpi tint-slate">
        <div class="kpi-ico">◷</div>
        <div class="kpi-label">OT this week</div>
        <div class="kpi-val">${(function(){
          const ws = iso(APP.weekStart);
          const we = iso(new Date(APP.weekStart.getTime()+6*86400000));
          const WEEKLY_ORD = 40.25;
          let totalOT = 0;
          APP.employees.filter(e=>e.status==='Active').forEach(e => {
            const atts = APP.registers.attendance.filter(a => a.employee===e.pt_code && iso(a.date||'')>=ws && iso(a.date||'')<=we);
            // Saturday hours are all OT
            const satHrs = atts.filter(a => isSaturday(iso(a.date||''))).reduce((s,a) => s + Number(a.hoursWorked||0), 0);
            // Weekday hours over 40.25 threshold
            const wkdayHrs = atts.filter(a => !isSaturday(iso(a.date||''))).reduce((s,a) => s + Number(a.hoursWorked||0), 0);
            const wkdayOT = Math.max(0, wkdayHrs - WEEKLY_ORD);
            totalOT += satHrs + wkdayOT;
          });
          return totalOT.toFixed(1);
        })()}<span class="unit">hr</span></div>
      </div>

  var active = APP.employees.filter(function(e){return e.status==='Active'});
  var allMarked = active.every(function(e){ var a = getAtt(e.pt_code, selDay); return a && a.status; });
  var unmarkedCount = active.filter(function(e){ var a = getAtt(e.pt_code, selDay); return !a || !a.status; }).length;
  var presentCount = active.filter(function(e){ var a = getAtt(e.pt_code, selDay); return a && (a.status==='p'||a.status==='late'); }).length;
  var absentCount = active.filter(function(e){ var a = getAtt(e.pt_code, selDay); return a && a.status==='a'; }).length;
  var dayBtns = '';
  for (var i=0; i<days.length; i++) {
    var d = days[i];
    var bg = d.date===selDay ? 'var(--blue)' : d.today ? 'var(--blue-soft)' : 'var(--paper)';
    var clr = d.date===selDay ? '#fff' : d.today ? 'var(--blue)' : 'var(--ink-2)';
    var bdr = d.date===selDay ? 'var(--blue)' : 'var(--line)';
    dayBtns += '<button onclick="APP._selectedDay=\'' + d.date + '\';render();" style="flex:1;min-width:50px;padding:8px 4px;border-radius:var(--r-sm);font-size:12px;font-weight:600;text-align:center;background:' + bg + ';color:' + clr + ';border:1px solid ' + bdr + ';">' + d.label + '</button>';
  }
  var empRows = '';
  for (var j=0; j<active.length; j++) {
    var e = active[j];
    var a = getAtt(e.pt_code, selDay);
    var st = a ? a.status : '';
    var marked = st==='p'||st==='late'||st==='a'||st==='leave'||st==='ph';
    var rowBg = st==='p'?'var(--tint-sage)':st==='late'?'var(--tint-amber)':st==='a'?'var(--tint-rose)':st==='leave'?'var(--tint-blue)':st==='ph'?'var(--tint-slate)':'var(--ivory)';
    var statusLabel = st==='p'?'Present':st==='late'?'Late':st==='a'?'Absent':st==='leave'?'Leave':st==='ph'?'PH':'—';
    var flagCls = st==='p'?'ok':st==='late'?'warn':st==='a'?'alert':'neutral';
    var tickBg = marked ? 'var(--green)' : 'var(--paper)';
    var tickClr = marked ? '#fff' : 'var(--muted)';
    var tickChar = marked ? '&#10003;' : '&middot;';
    empRows += '<div onclick="modalAttendance(\'' + e.pt_code + '\',\'' + selDay + '\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:' + rowBg + ';border:1px solid var(--line);border-radius:var(--r-sm);min-height:var(--tap);cursor:pointer;">'
      + '<div style="width:36px;height:36px;border-radius:8px;background:' + tickBg + ';color:' + tickClr + ';font-size:16px;font-weight:700;display:grid;place-items:center;flex-shrink:0;">' + tickChar + '</div>'
      + '<div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:14px;">' + e.full_name + '</div><div style="font-size:11px;color:var(--muted);">' + (e.occupation || e.pt_code) + '</div></div>'
      + '<span class="flag ' + flagCls + '" style="font-size:11px;">' + statusLabel + '</span>'
      + '</div>';
  }
  var dayTitle = new Date(selDay + 'T12:00').toLocaleDateString('en-ZA', {weekday:'long', day:'numeric', month:'short'});
  return '<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;">' + dayBtns + '</div>'
    + '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">'
    + '<button class="btn primary" onclick="markAllPresent(\'' + selDay + '\')" style="font-size:13px;">&#10003; Mark all present</button>'
    + '<span style="font-size:12px;color:var(--muted);">' + presentCount + ' present &middot; ' + absentCount + ' absent &middot; ' + unmarkedCount + ' unmarked</span>'
    + '</div>'

    + '<div class="panel-head"><div><div class="panel-title">' + dayTitle + '</div><div class="panel-sub">Tap to change status</div></div></div>'
    + '<div style="display:flex;flex-direction:column;gap:4px;">' + empRows + '</div>'
    + '</div>';

function shiftWeek(dir) {
  const d = new Date(APP.weekStart); d.setDate(d.getDate() + dir*7); APP.weekStart = d; APP._selectedDay = null; render();
}
function jumpToWeek(dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr + 'T12:00:00');
  // Find the Friday on or before this date
  const day = d.getDay(); // 0=Sun..6=Sat
  const diff = (day + 2) % 7; // days since last Friday
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  APP.weekStart = d; APP._selectedDay = null;
  render();
}
function jumpToToday() {
  APP._selectedDay = null;
  APP.weekStart = lastFriday();
  render();
}
async function markAllPresent(date) {
  if (!confirm('Mark all active employees as Present for ' + fmtD(date) + '?')) return;
  toast('Marking all present...', 'success');
  const active = APP.employees.filter(e => e.status === 'Active');
  const toMark = active.filter(e => {
    const existing = APP.registers.attendance.find(a => a.employee === e.pt_code && iso(a.date||'') === date);
    return !existing || !existing.status || (existing.status !== 'p' && existing.status !== 'late' && existing.status !== 'leave' && existing.status !== 'ph' && existing.status !== 'a');
  });
  // Send in batches of 5 to avoid overloading Apps Script
  for (let i = 0; i < toMark.length; i += 5) {
    const batch = toMark.slice(i, i + 5);
    const results = await Promise.all(batch.map(e => {
      const existing = APP.registers.attendance.find(a => a.employee === e.pt_code && iso(a.date||'') === date);
      const dd = dayDefaults(date);
      const entry = {
        ...(existing ? {id: existing.id} : {}),
        date, employee: e.pt_code, status: 'p', timeIn: dd.timeIn, timeOut: dd.timeOut, hoursWorked: dd.hoursWorked, lateMinutes: 0, notes: ''
      };
      return api(existing ? 'updateEntry' : 'addEntry', { register: 'attendance', entry });
    }));
    results.forEach((r, j) => {
      if (!r || !r.ok) return;
      const e = batch[j];
      const dd2 = dayDefaults(date);
      const existing = APP.registers.attendance.find(a => a.employee === e.pt_code && iso(a.date||'') === date);
      if (existing) {
        Object.assign(existing, { status: 'p', timeIn: dd2.timeIn, timeOut: dd2.timeOut, hoursWorked: dd2.hoursWorked, lateMinutes: 0 });
      } else {
        APP.registers.attendance.push({ id: (r.data?r.data.id:null) || uid(), date, employee: e.pt_code, status: 'p', timeIn: dd2.timeIn, timeOut: dd2.timeOut, hoursWorked: dd2.hoursWorked, lateMinutes: 0, notes: '' });
      }
    });
    toast(`Marking... ${Math.min(i+5, toMark.length)}/${toMark.length}`, 'success');
  }
  toast('All marked present', 'success');
  renderSidebar(); render();
}
async function quickTick(code, date) {
  const existing = APP.registers.attendance.find(a => a.employee === code && iso(a.date||'') === date);
  if (existing && (existing.status === 'p' || existing.status === 'late' || existing.status === 'leave' || existing.status === 'ph')) return; // already marked
  const dd = dayDefaults(date);
  const entry = {
    ...(existing ? {id: existing.id} : {}),
    date, employee: code, status: 'p', timeIn: dd.timeIn, timeOut: dd.timeOut, hoursWorked: dd.hoursWorked, lateMinutes: 0, notes: ''
  };
  const action = existing ? 'updateEntry' : 'addEntry';
  const r = await api(action, { register: 'attendance', entry });
  if (r.ok) {
    if (existing) {
      Object.assign(existing, { status: 'p', timeIn: dd.timeIn, timeOut: dd.timeOut, hoursWorked: dd.hoursWorked, lateMinutes: 0 });
    } else {
      APP.registers.attendance.push({ id: (r.data?r.data.id:null) || uid(), ...entry });
    }
    render();
  } else toast('Failed', 'danger');
}

function regRowSummary(reg, r) {
  if (reg==='overtime') return `${r.hours||0}h @ ${r.rate||'1.5×'} · ${r.reason||''}`;

  if (reg==='warnings') return `${r.type||''} · ${r.offence||''}`;

  if (reg==='medical') return `${r.days||0}d · ${r.doctor||''} · ${r.valid===true||r.valid==='true'?'Valid':'Invalid'}`;

/* Petty cash with proper source/recipient model */
function viewPettyCash() {
  const rows = APP.registers.pettycash || [];
  // #6 Filter to current Fri→Thu week for tin calc; exclude squared (already repaid)
  const ws = iso(APP.weekStart);
  const we = iso(new Date(APP.weekStart.getTime() + 6*86400000));
  const inWeek = r => { const d = iso(r.date||r.dateAdvanced||r.createdAt||''); return d >= ws && d <= we; };
  const weekRows = rows.filter(inWeek);
  const liveStatus = r => r.status !== 'squared' && r.status !== 'overdue_to_loan';
  const out = weekRows.filter(r=>Number(r.amountOut)>0 && liveStatus(r)).reduce((s,r)=>s+Number(r.amountOut||0),0);
  const ind = weekRows.filter(r=>Number(r.amountIn)>0).reduce((s,r)=>s+Number(r.amountIn||0),0);
  const tin = ind - out;

  return `
    <div class="panel-head" style="margin-bottom:14px;">

    ${rows.length===0 ? `

  const weekAtt = APP.registers.attendance.filter(a => a.employee===e.pt_code && iso(a.date||'')>=ws && iso(a.date||'')<=we);
  const totalDock = weekAtt.reduce((s,a) => s + Number(a.dockMinutes||0), 0);
  const hourlyRate = wage / 40.25;
  const dockDeduction = (totalDock / 60) * hourlyRate;
  const satHrs = weekAtt.filter(a => isSaturday(iso(a.date||''))).reduce((s,a) => s + Number(a.hoursWorked||0), 0);
  const wkdayHrs = weekAtt.filter(a => !isSaturday(iso(a.date||''))).reduce((s,a) => s + Number(a.hoursWorked||0), 0);
  const wkdayOT = Math.max(0, wkdayHrs - 40.25);
  const otHrs = satHrs + wkdayOT;
  const otPay = otHrs * hourlyRate * 1.5;
  const uifRate = Number(APP.settings.uif_rate || 0.01);

  const loanDed = APP.registers.loans.filter(l => l.employee===e.pt_code && Number(l.outstanding)>0).reduce((s,l) => s + Number(l.weeklyDeduction||0), 0);
  const garnishee = e.garnishee || 0;

function sigClear() { const c=document.getElementById('sigCanvas'); if (!c) return; c.getContext('2d').clearRect(0,0,c.width,c.height); _sigStrokes=0; const b=document.getElementById('signBtn'); if (b) b.disabled=true; }
let _sigStrokes=0;
function wireSig() {
  const c = document.getElementById('sigCanvas'); if (!c) return;
  c.width = c.clientWidth * 2; c.height = c.clientHeight * 2;
  const ctx = c.getContext('2d'); ctx.scale(2,2); ctx.strokeStyle='#1C1917'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false;
  const pos = e => { const r=c.getBoundingClientRect(); const t=e.touches?e.touches[0]:e; return [t.clientX-r.left, t.clientY-r.top]; };
  const start = e => { e.preventDefault(); drawing=true; const[x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); _sigStrokes++; if (_sigStrokes>2) { const b=document.getElementById('signBtn'); if (b) b.disabled=false; } };
  const move = e => { if(!drawing) return; e.preventDefault(); const[x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); };
  const end = e => { drawing=false; };
  c.addEventListener('mousedown', start); c.addEventListener('mousemove', move); c.addEventListener('mouseup', end); c.addEventListener('mouseleave', end);
  c.addEventListener('touchstart', start, {passive:false}); c.addEventListener('touchmove', move, {passive:false}); c.addEventListener('touchend', end);
}

async function saveAttendance(code, date, existingId) {
  // #16 Duplicate guard — if another entry for same emp+date exists, reuse its id
  if (!existingId) {
    const dup = APP.registers.attendance.find(a => a.employee===code && iso(a.date||'')===date);
    if (dup) existingId = dup.id;
  }
  let status = document.getElementById('a_status').value;
  const timeIn = document.getElementById('a_in').value;
  const timeOut = document.getElementById('a_out').value;
  const notes = document.getElementById('a_notes').value;
  // Validate time order
  if (timeIn && timeOut && timeIn >= timeOut) { toast('Time in must be before time out','danger'); return; }
  // Late-coming rules: start 08:00, grace to 08:05, dock 30min 08:06–08:30, dock 1hr 08:31–09:00, supervisor decides after 09:00
  let lateMin = 0;
  let dockMin = 0;
  if (timeIn && (status === 'p' || status === 'late')) {
    const [h,m] = timeIn.split(':').map(Number);
    const mins = h*60+m;
    if (mins > 485) { // after 08:05 grace
      lateMin = mins - 480;
      status = 'late';
      if (mins <= 510) { // 08:06–08:30 → dock 30 min
        dockMin = 30;
      } else if (mins <= 540) { // 08:31–09:00 → dock 1 hour
        dockMin = 60;
      } else { // after 09:00 → supervisor decides (work or go home)
        dockMin = 60; // default dock, supervisor can override via notes
      }
    }
  }
  // Calc hours worked
  let hoursWorked = 0;
  const BREAK_HRS = 0.75; // 45-min unpaid break
  const WEEKLY_ORD = 40.25;
  let overtimeMin = 0;
  if (timeIn && timeOut) {
    const [h1,m1] = timeIn.split(':').map(Number); const [h2,m2] = timeOut.split(':').map(Number);
    hoursWorked = ((h2*60+m2) - (h1*60+m1))/60 - BREAK_HRS;
    if (hoursWorked < 0) hoursWorked = 0;
    // dockMinutes stored separately — deducted at payroll, not from hoursWorked
    // Saturday = all hours are OT; weekdays = check against 40.25 weekly threshold
    if (isSaturday(date)) {
      overtimeMin = Math.round(hoursWorked * 60);
    } else {
      const ws = iso(APP.weekStart);
      const we = iso(new Date(APP.weekStart.getTime()+6*86400000));
      const otherHrs = APP.registers.attendance
        .filter(a => a.employee===code && iso(a.date||'')>=ws && iso(a.date||'')<=we && iso(a.date||'')!==date && !isSaturday(iso(a.date||'')))
        .reduce((s,a) => s + Number(a.hoursWorked||0), 0);
      const weekTotal = otherHrs + hoursWorked;
      if (weekTotal > WEEKLY_ORD) overtimeMin = Math.round((weekTotal - WEEKLY_ORD) * 60);
    }
  }
  const entry = {
    ...(existingId?{id:existingId}:{}),
    date, employee:code, status, timeIn, timeOut, hoursWorked: Math.round(hoursWorked*100)/100, lateMinutes:lateMin, dockMinutes:dockMin, overtimeMinutes:overtimeMin, notes
  };
  const action = existingId ? 'updateEntry' : 'addEntry';
  const r = await api(action, { register:'attendance', entry });
  if (r.ok) {
    if (existingId) {
      const ix = APP.registers.attendance.findIndex(x=>x.id===existingId);
      if (ix>=0) APP.registers.attendance[ix] = { ...APP.registers.attendance[ix], ...entry };
    } else {
      APP.registers.attendance.push({ ...entry, id: r.data.id || uid() });
    }
    // Auto-log overtime to OT register if detected
    if (overtimeMin > 0) {
      const otHours = Math.round(overtimeMin / 60 * 100) / 100;
      const existingOT = APP.registers.overtime.find(o => o.employee === code && iso(o.date||'') === date);
      const otRate = '1.5×';
      const otReason = isSaturday(date) ? 'Saturday OT (auto)' : 'Weekday OT (auto)';
      const otEntry = { ...(existingOT ? {id: existingOT.id} : {}), date, employee: code, hours: otHours, rate: otRate, authorisedBy: APP.currentUser.name, reason: otReason };
      const otAction = existingOT ? 'updateEntry' : 'addEntry';
      api(otAction, { register: 'overtime', entry: otEntry }).then(otR => {
        if (otR.ok) {
          if (existingOT) Object.assign(existingOT, otEntry);
          else APP.registers.overtime.push({ ...otEntry, id: otR.data?.id || uid() });
          renderSidebar();
        }
      });
    }
    closeModal(); toast('Saved','success');
    renderSidebar(); render();
  } else toast('Save failed: '+(r.error||''), 'danger');
}

      <div class="full"><label class="form-label">Purpose</label><input type="text" id="loan_purpose"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveLoan()">Save</button></div>`, () => {
    document.getElementById('loan_date').value = today();
    if (code) document.getElementById('loan_emp').value = code;
  });
}
async function saveLoan() {
  const amt = parseFloat(document.getElementById('loan_amount').value) || 0;
  const weekly = parseFloat(document.getElementById('loan_weekly').value) || 0;
  const purpose = document.getElementById('loan_purpose').value.trim();
  if (amt <= 0) { toast('Loan amount must be > 0','danger'); return; }
  if (weekly <= 0) { toast('Weekly deduction must be > 0','danger'); return; }
  if (weekly > amt) { toast('Weekly deduction can\'t exceed loan','danger'); return; }
  if (!purpose) { toast('Purpose is required (BCEA s.34)','danger'); return; }
  const entry = {
    dateAdvanced: document.getElementById('loan_date').value,
    employee: document.getElementById('loan_emp').value,
    loanAmount: amt, weeklyDeduction: weekly,
    outstanding: amt, paymentMethod: document.getElementById('loan_method').value,
    purpose
  };
  const r = await api('addEntry', { register:'loans', entry });
  if (r.ok) {
    APP.registers.loans.unshift(r.data);
    closeModal(); toast('Loan granted','success');
    renderSidebar(); render();
  } else toast('Failed','danger');
}

function modalMedical(code) {
  openModal(`
    <h2>Log sick note</h2>
    <div class="modal-sub">Photo saves to employee folder</div>
    <div class="form-grid">
      <div class="full"><label class="form-label">Employee</label><select id="m_emp">${empOpts()}</select></div>
      <div class="half"><label class="form-label">From</label><input type="date" id="m_from"></div>
      <div class="half"><label class="form-label">To</label><input type="date" id="m_to"></div>

      <div class="half"><label class="form-label">Valid?</label><select id="m_valid"><option value="true">Yes</option><option value="false">No</option></select></div>
      <div class="full"><label class="form-label">Doctor</label><input type="text" id="m_doctor"></div>
      <div class="full"><label class="form-label">Photo of certificate</label><input type="file" accept="image/*" capture="environment" id="m_photo"></div>
    </div>
    <div class="modal-foot"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveMedical()">Save</button></div>`, () => {
    document.getElementById('m_from').value = today();
    document.getElementById('m_to').value = today();
    if (code) document.getElementById('m_emp').value = code;
  });

async function saveMedical() {
  const entry = {
    employee: document.getElementById('m_emp').value,
    dateFrom: document.getElementById('m_from').value, dateTo: document.getElementById('m_to').value,
    days: parseFloat(document.getElementById('m_days').value)||0,
    valid: document.getElementById('m_valid').value==='true',
    doctor: document.getElementById('m_doctor').value
  };
  const r = await api('addEntry', { register:'medical', entry });
  if (!r.ok) { toast('Failed: '+(r.error||''), 'danger'); return; }
  APP.registers.medical.unshift(r.data);
  const file = document.getElementById('m_photo').files[0];
  if (file) {
    try {
      const b64 = await new Promise((res,rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const up = await api('uploadPhoto', { ptCode:entry.employee, folder:'medical', filename:entry.dateFrom+'_cert.'+file.name.split('.').pop(), base64:b64 });
      if (!up.ok) toast('Note saved but photo upload failed: '+(up.error||''), 'danger');
    } catch(err) { toast('Photo upload error: '+err.message, 'danger'); }
  }
  closeModal(); toast("Doctor's note logged",'success'); renderSidebar(); render();
}

  openModal(`

    <div class="form-grid">
      <div class="full">
        <label class="form-label">Who is receiving?</label>
        <select id="pc_recip_type" onchange="pcRecipChange()">
          <option value="emp">Employee (on payroll)</option>
          <option value="casual">Casual worker / once-off</option>
          <option value="internal">Internal (Nisha, Annika, Veshi, etc.)</option>
          <option value="supplier">Supplier / vendor</option>
        </select>
      </div>
      <div class="full" id="pc_emp_wrap">
        <label class="form-label">Employee</label>

      <div class="half"><label class="form-label">Category</label><select id="pc_cat"><option>Tolls</option><option>Diesel</option><option>Airtime</option><option>Materials</option><option>Taxi</option><option>Wages (casual)</option><option>Other</option></select></div>
      <div class="full"><label class="form-label">Reason / detail</label><input type="text" id="pc_reason" placeholder="e.g. Durban delivery tolls + parking"></div>

}
function pcRecipChange() {
  const type = document.getElementById('pc_recip_type').value;
  document.getElementById('pc_emp_wrap').style.display = type==='emp' ? '' : 'none';
  document.getElementById('pc_name_wrap').style.display = type==='emp' ? 'none' : '';
}
async function savePCOut() {
  const type = document.getElementById('pc_recip_type').value;
  const amt = parseFloat(document.getElementById('pc_amt').value) || 0;
  const reason = document.getElementById('pc_reason').value.trim();
  if (amt <= 0) { toast('Amount must be > 0','danger'); return; }
  if (!reason) { toast('Reason is required','danger'); return; }
  const entry = {
    amountOut: amt,
    category: document.getElementById('pc_cat').value,
    reason,
    source: 'Tin',
    status: 'open'
  };
  if (type === 'emp') {
    entry.employee = document.getElementById('pc_emp').value;
    entry.recipientLabel = (APP.empMap[entry.employee]||{}).full_name;
    entry.recipientType = 'employee';
  } else {
    entry.employee = type.toUpperCase();
    entry.recipientLabel = document.getElementById('pc_name').value + ' (' + type + ')';
    entry.recipientType = type;
  }
  const r = await api('addEntry', { register:'pettycash', entry });
  if (r.ok) {
    APP.registers.pettycash.unshift(r.data);
    closeModal(); toast('Cash out logged','success');
    renderSidebar(); render();
  } else toast('Failed','danger');
}
function modalPCIn() {
  openModal(`
    <h2>Cash in</h2>
    <div class="modal-sub">Money added to the tin</div>
    <div class="form-grid">
      <div class="full">
        <label class="form-label">Where from?</label>

          ${APP.users.filter(u=>['all','near','pettycash'].includes(u.perms)).map(u=>`<option value="${u.id}">${u.name}</option>`).join('')}
        </select>

      <div class="half"><label class="form-label">Amount (R)</label><input type="number" step="0.01" id="pci_amt" inputmode="decimal"></div>

    </div>

}
async function savePCIn() {
  const src = document.getElementById('pci_src').value;
  const who = document.getElementById('pci_who').value;
  const uName = (APP.users.find(u=>u.id===who)||{}).name || who;
  const amt = parseFloat(document.getElementById('pci_amt').value)||0;
  if (amt <= 0) { toast('Amount must be > 0','danger'); return; }
  const entry = {
    employee: who.toUpperCase(),
    recipientLabel: uName + ' (put in)',
    recipientType: 'internal',
    amountIn: amt,
    category: src,
    reason: document.getElementById('pci_notes').value || src,
    source: src,
    status: 'logged'
  };
  const r = await api('addEntry', { register:'pettycash', entry });
  if (r.ok) {
    APP.registers.pettycash.unshift(r.data);
    closeModal(); toast('Cash in logged','success');
    renderSidebar(); render();
  } else toast('Failed','danger');
}

async function pcSquare(id) {
  const r = await api('updateEntry', { register:'pettycash', entry:{ id, status:'squared' } });
  if (r.ok) { const e = APP.registers.pettycash.find(x=>x.id===id); if (e) e.status='squared'; toast('Reconciled','success'); render(); }
}

/* ============================================================
   GENERIC SAVE
   ============================================================ */
async function saveGeneric(register, fields, successMsg) {
  const entry = {};
  for (const k in fields) {
    const el = document.getElementById(fields[k]);
    let v = el.value;
    if (el.type === 'number') v = parseFloat(v) || 0;
    entry[k] = v;
  }
  const r = await api('addEntry', { register, entry });
  if (r.ok) {
    APP.registers[register].unshift(r.data);
    closeModal(); toast(successMsg,'success');
    renderSidebar(); render();
  } else toast('Failed: '+(r.error||''), 'danger');
}
async function deleteEntry(register, id) {
  if (!confirm('Delete?')) return;
  const r = await api('deleteEntry', { register, id });
  if (r.ok) { APP.registers[register] = APP.registers[register].filter(x=>x.id!==id); toast('Deleted','success'); render(); }
}

/* ============================================================
   PAYROLL
   ============================================================ */
async function runPayroll() {
  const ws = iso(APP.weekStart);
  const active = APP.employees.filter(e => (e.status||'Active')==='Active').length;
  if (!confirm(`Run payroll for week starting ${ws}?\nThis generates ${active} PDFs in Drive.`)) return;
  toast('Running…','success'); setSync('syncing');
  const r = await api('runPayroll', { weekStart: ws });
  if (r.ok) { APP._lastPayroll = r.data; toast(`✓ ${r.data.results.length} payslips · Net ${fmtR(r.data.total)}`,'success'); render(); }
  else toast('Payroll failed: '+(r.error||''), 'danger');
}

/* ============================================================
   UTILS
   ============================================================ */
function toast(msg, k) {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast show '+(k||'');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.className = 'toast '+(k||''), 2800);
}
function toggleTheme() {
  APP.theme = APP.theme==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', APP.theme);
  localStorage.setItem('pullens_theme', APP.theme);
}

/* ============================================================
   INIT
   ============================================================ */
function initApp() {
  renderSidebar(); render();
  // Show logged-in user in topbar
  if (APP.currentUser) {
    const u = APP.currentUser;
    document.getElementById('topUser').innerHTML = `<span style="width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:700;">${(u.name||'?')[0]}</span>${(u.name?u.name.split(' ')[0]:'') || u.id} <span style="font-size:9px;color:var(--muted);font-weight:400;">tap to logout</span>`;
  }
  // Wire signature pad if needed
  const obs = new MutationObserver(() => { if (document.getElementById('sigCanvas')) wireSig(); });
  obs.observe(document.getElementById('mainView'), { childList:true, subtree:true });
}

document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('sbBackdrop').addEventListener('click', closeSidebar);
document.getElementById('drawerBg').addEventListener('click', closeDrawer);
document.getElementById('modalBg').addEventListener('click', e => { if (e.target.id==='modalBg') closeModal(); });
document.querySelectorAll('.bb-item').forEach(b => b.addEventListener('click', () => openView(b.dataset.view)));
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeDrawer(); closeSidebar(); } });

// Resume session
const saved = sessionStorage.getItem('pullens_user');
if (saved) {
  const parsed = JSON.parse(saved);
  APP.currentUser = parsed;
  APP.sessionToken = parsed.token || null;
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('active');
  loadAll().then(initApp);
} else {
  renderLogin();
}

setTimeout(()=>toast('Welcome'), 800);
</script>
